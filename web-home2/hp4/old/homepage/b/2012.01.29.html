<p>Assy(アッシー)のページ</p>
<p><b>覚える知性</b> 21:47</p>
<p>覚える知性がない。</p>
<p>知性を高め、覚える。</p>
<p>----</p>
<p><b>英語</b> 21:48</p>
<p>英語は、話し方をまず覚える。</p>
<p>次に、話の内容を覚える。</p>
<p>----</p>
<p><b>言葉</b> 22:20</p>
<p>英語などの言語では、</p>
<p>文の後ろの方を取り除いて、</p>
<p>単純にしても、一応は成り立つ。</p>
<p>そこで、その後ろの方をつけると</p>
<p>意味は、ツリー構造になる。</p>
<p>----</p>
<p><b>日本語</b> 22:22</p>
<p>日本語は、逆に、</p>
<p>単語を作って、それを使って</p>
<p>意味と文を作る。</p>
</p>
