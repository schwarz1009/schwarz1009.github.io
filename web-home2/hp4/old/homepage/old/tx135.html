<p>自由の無い社会主義では、経済が発展する。国家が発展する。比較的普通の方だ。</p>
<p>自由主義では、経営者が自由で、同じである。経営者の方が国家よりも強い。経営者には誰でもなれる。</p>
<p>世界中にオフィスを構えて、グローバルな競争をし、自由な会社内部に、頑張っただけの利益が集まる。</p>
<p>経営者の方が国家より強いとは、大企業は国際企業で、アメリカにもドイツにも、日本にも会社があるからである。</p>
<p>しかし、勝つのは利益を追求した企業である。良い企業が勝てば良いが。</p>
