<p>最後も自由だ。</p>
<p>それぞれが完全に自由で、何でも自由に出来た方が良い。何故なら、一人の人間に従う国家では、誰も考えない。</p>
<p>スターリンが考えるだけだ。</p>
<p>それぞれが、個人、家庭、会社、国家、そうした部分で分離して、自由で、何でも出来て、何でも行動できて、そこで考えた方が賢い。</p>
<p>それだけではない。自分で自由にやらなければ分からない事がある。人間として、生命として自由なだけで、一人違った賢い人間になれる。教えれば、皆賢くなる。そして、教われば、まさに賢いからだ。</p>
