<p>発展は、一つだけ。生産と労働である。</p>
<p>その点、8時間全員働くのがいいが、それだけでは悪い。</p>
<p>つまり、賢くし、健康にし、情報を与え、余裕を与える。</p>
<p>そうして考えると、普通なら、いくら働いてもつらくないどころか、別の労働を助けるぐらい出来る。</p>
<p>で、それだけ。後は、自由競争をしていれば良いし、適当に評議会がやっていれば良いが、これが一番最悪に見える。</p>
<p>----</p>
<p>特に、何を考えても馬鹿なだけだと分かった。何もせず、キリスト教をやっていれば良い。終わり。</p>
