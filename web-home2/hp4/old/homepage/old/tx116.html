<p>人を信じて許す事、感情で分かる事、実感する事、が、まず良いと思う。</p>
<p>その次に、人とのコミュニケーションと、そこでの楽しさ、優しさ、ついでに自由、が良いと思っていた。</p>
<p>最後に、人に自分を教え、新しく悟らせる事があった。そして、それによって、世界は変わっていく。</p>
<p>それは、良い方になれば良いけど、悪い方になれば悪い。</p>
