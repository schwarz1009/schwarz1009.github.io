<p>大学や会社が民主主義かというと、そうではない。政治家と選挙が民主主義だ。</p>
<p>民主主義では、人を決める。党が２つ、沢山、あったりするのが選挙だ。</p>
<p>民主主義国は、政党が違う。ドイツでは、社会民主党とキリスト教民主党がやっている。アメリカは、もちろん共和党と民主党。そして、日本では、民主党、社民党、自民党、共産党、等。</p>
<p>民主主義国は、大統領を決める。あるいは、首相、王、色々と居る。その上で、民衆の声を聞くかというと、むしろ、民衆に演説をする。そして、1人支持する。党首と政治家を見て、1人1人決めるのである。</p>
