        <p>民族とは何なのでしょう？誰かの子孫の集まりだとは思いますが、最初からあるのでしょうか？</p>

        <p>歴史とは何で、何があったのでしょう？それぞれの民族は、子孫と一族は、続いていきます。国家の歴史においては、豊かさと国としての実態が変わります。何が変わるのでしょう？ものや文化、土地の産物、いや、ヨーロッパであれば、まぁどこでも、商品や商人がいますから、職業が違います。出来る事が違いますから、国として何をしているか、機械製品や職業のスキルの違いがあると思います。</p>
