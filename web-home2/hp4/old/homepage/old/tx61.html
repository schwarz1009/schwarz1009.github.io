<p>何でも作れる、という柔軟性を取るのであれば、共産主義が良い。</p>
<p>公社と計画経済によって、何を作っても良いから、利益にならないものでも作る事が出来る。</p>
<p>その代わり、労働を保証して、最低限の給与をもたらした上で、自由な金儲けによる発展を遂げるのであれば、社会民主主義、あるいは、自由主義が良い。</p>
<p>税金で最低限の生活を保障し、政府を民主主義にし、労働を自由にする。</p>
