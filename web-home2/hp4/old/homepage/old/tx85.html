<p>共産主義は革命の思想であるため、悪い。</p>
<p>社会民主主義は、平等で、それぞれの生活保障などがあるが、発展しない。</p>
<p>自由主義の国家主義ならば、最も発展するが、国家主義が悪い。</p>
<p>ただの自由主義が、発展する、という意味でいいだろう。</p>
<p>それから、民主主義の方が社会主義よりも機能するため、良いだろう。</p>
