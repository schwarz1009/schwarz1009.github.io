        <p>財産、家族以外に重要なものはありません。</p>
        <p>何をするかと何になるかだけが重要です。</p>
        <p>すべき事の中にも、すべきではない、しなくてもしても良い事が多いです。</p>
        <p>何になりたいかとしても、何になるべきか分かっていないはずです。</p>
