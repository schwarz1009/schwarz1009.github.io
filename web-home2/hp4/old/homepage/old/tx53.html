<p>学校は、大学の方を専門とし、中学高校は受験のためみたいになっている。</p>
<p>一つの専門家を育てるためである。</p>
<p>しかし、専門家はつまらない。というよりは、むしろ共通と専門を逆にした方が良い。</p>
<p>中学高校で専門を決めたほうが良いし、沢山の人々と係わり合いをもって、豊かな経験のある人格を育てた方が良い。</p>
<p>大学は、何でも出来た方がいい。何でも知れた方が良い。それらは、過去の自分の経験から本質が分かる。</p>
<p>夢物語のようだが。</p>
