<p>管理社会の悪いところは、ボトムアップに意見を出し、言いたい事を言ったり変えたり出来ない事。</p>
<p>賢いものが支配者となるか、社会は民主主義とするか、全員の人民国家にするか。</p>
<p>支配者は存在すべきで、それは賢い者が自由になれるべきで、</p>
<p>しかし、何も分かっていない人間は駄目だ。</p>
<p>例えば、教育は科学だけじゃない。でも、人間の育成ではない。子供や学生の心を知るべきに思える。</p>
<p>それに、僕は自然な愛が好きだ。皆で作る国家にすべきだ。</p>
