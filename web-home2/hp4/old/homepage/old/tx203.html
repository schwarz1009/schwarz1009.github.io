<p>・肯定すれば、道は開ける。その代わり、悪い人間は、信頼しないで良い。</p>
<p>----</p>
<p>・最初が良ければ、継続は全て良いものだ。最初が悪いと、継続は全て悪くなる。よく考える事。</p>
<p>・こつこつと積み上げ、努力して(分かって)良い事をするのも、正しい。しかし、継続の方が、さらに良いものだ。</p>
<p>僕は、最初がいつも悪い。その点、よく頑張る。皆は、僕は忘れる事。そして、思い出にして欲しい。</p>
