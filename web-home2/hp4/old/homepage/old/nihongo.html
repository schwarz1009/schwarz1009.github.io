        <p>日本語を改良した事があるので、それを発表します。</p>
        <p>じ：フランス語のde。要は、「の」の逆順です。</p>
        <p>け：スペイン語などにある線過去。その時期を表します。</p>
        <p>げ：動詞を英語的な順序にします。かわいがるげオットセイを、と言う風に使います。</p>
        <p>他にも色々と思いつきましたが、使ってはいません。</p>
        <p>他に、面白い２つを。</p>
        <p>ぺ：それよりも広範囲のものを表す。例：ぺ宇宙：宇宙より大きなものを表す。</p>
        <p>ぽ：何かの一部を表す。例：ぽ人間：人間の一部を表す。</p>
        
</p>
