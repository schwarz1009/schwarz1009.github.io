        <p>僕の良くしていた想像力の積み重ね。</p>
        <p>どういう時どういう事になるかを、想像力で想像する。</p>
        <p>その後に、実際に試す。</p>
        <p>文章があれば、自分ならばどう考えるかを思って、立場を理解する。</p>
        <p>時系列的に見れば、どのような時にどのような事を思ったかを理解する事で、人々の状態を思う。</p>
        <p>後は、想像力と実体験による真実を積み重ねる事で、不可知な領域の知を得る。</p>
        
</p><script type="text/javascript" src="/js/script.js"></script>
