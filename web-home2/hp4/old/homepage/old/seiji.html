        <p>政治に対しての意見。</p>
        <p>国の主要産業として、例えば農業と工業など、軸に据えた経済政策を行い、できれば農場や工場を建設して、雇用の保証と経済成長を行いなさい。</p>
        <p>子供にものを、例えば、コンピュータやサッカーボールを与えなさい。</p>
        <p>大人には、生産手段や研究手段、文章を与えなさい。</p>
        <p>教育は、さらに研究を増やし、覚えるための文書を百科事典的に増やしなさい。</p>
        <p>政治手段としては、民主主義であれば、政治家を免許制にし、免許試験を行い、政治家の質を保証しなさい。</p>
        <p>----</p>
        <p>経営者に対しては、利用者の意見を取り入れ、品質保証などを業界で規定して守り、消費者に対して良いものを提供しなさい。</p>
        
</p><script type="text/javascript" src="/js/script.js"></script>
