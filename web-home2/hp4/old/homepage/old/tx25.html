<p>僕の論理は、極端すぎて、現実を見ていない。</p>
<p>現実を見れば、経済発展が重要である。</p>
<p>理想すぎても、カバーしすぎても、悲観過ぎても、１つしか見ないのも悪い。</p>
<p>そうすると、1人1人が努力すべき、という前提は、正しい。</p>
<p>その代わり、政治家が分かっていない。</p>
<p>それぞれの分野において、問題は多い。</p>
<p>それぞれの問題を知っている専門家が努力しているが、別の畑の知恵を参考にする事で、問題の解決はしやすく出来るはずである。</p>
<p>例えば、社会学の専門家と哲学の知恵は融和出来るはずである。</p>
