<p>肯定すれば良いんだよ。</p>
<p>僕は、否定ばっかりしているだけで、</p>
<p>心がおかしく活動しているだけで、</p>
<p>悲しく、否定しているのが怖いだけなんだ。</p>
<p>----</p>
<p>肯定できない。まだ、肯定するのが怖い。</p>
<p>いや、今の僕には出来るよ。むしろ、嬉しい。</p>
<p>----</p>
<p>後は、肯定すると、思い出せるし、賢くなる。</p>
<p>否定しているだけでは、分からないし、怖いだけだと思う。</p>
<p>でも、色々と執筆できたけど。</p>
<p>----</p>
<p>そういうわけで、肯定すれば良いはずだ。</p>
        
</p>
