<p>自分に出来る事は、少ない。</p>

<p>----</p>

<p>政治が悪いのだろうか。</p>

<p>歴史が悪いのだろうか。</p>
<p>----</p>
<p>そんな事を考えていた、昔があったような気がする。</p>
