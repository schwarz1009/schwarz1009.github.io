<p>アーロベは、皆と話す人格神です。</p>

<p>アセテラは、活動する神で、革命を起こしたり、ルールを築いたり、悪いものを殺したり、皆を従えます。</p>
<p>ケラーは、皆を導く神です。次の世界の選択肢を与え、どちらかを選ばせます。</p>
<p>他にも色々とします。</p>
