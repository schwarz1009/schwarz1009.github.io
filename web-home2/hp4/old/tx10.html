<p>◇◇</p>
<p>日本は、江戸時代は武士で強く、帝国は軍事力で中露に勝つほど強く、アメリカには負けたが、その後、パクって働いて強かった。</p>
<p>なぜ、そんなに強かったのだろう。最近は、見るからに弱くなった。</p>
<p>おそらく、日本は著しく強い国なのだ。</p>
<p>それこそ、ナポレオンもヒトラーもロシアで敗北しているのに、日本は勝っている。</p>
<p>モノ作りという原点が強かった。簡単な機械なら何でも作れるのが戦後日本だ。</p>
<p>おそらく、軍事力で作った国営公社をそのまま会社にした。そこが強かった。</p>
<p>ドイツも強かった。そうすると、ソ連（ロシア）が強くなるかもしれない。</p>
<p>何をすれば強くなるか。むしろ、アメリカ的に強くなれば良い。</p>
<p>NASAを作れば良いように見える。ドイツ以上の発明をし、IBMを作れば良い。富士通があるが・・・。</p>
<p>要は、軍事にすれば良いが、それはつまらない。</p>
<p>全員公務員、全員の自由と平等は、つまらない。何も出来ないから。</p>
<p>軍事は会社を強くするが、悪い点が多い。まず、大量に外国人を殺す。そして、はむかう国民も殺す。</p>
<p>権力者は、偉いだけ悪い。</p>
<p>そうすると、国民のことを考える経済をすれば良い。</p>
<p>国家計画経済をすれば良いように見える。</p>
<p>いや、それは国家のことを考える経済になる。</p>
<p>そうすると、自由にすべき、平等にすべき、と言うことになる。</p>
<p>自由にすると、市場と自由の経済、ということになるが、平等でない。</p>
<p>最後まで考えると、ソ連になるものだ。</p>
<p>平等の計画経済と、自由の市場経済を比べると、自由な方が良かった。</p>
<p>その上で強くするならば、帝国をすれば良い。アメリカだ。</p>
<p>自由は可能性だ。未来を開き、未来を変える。</p>
<p>それぞれの自由があれば、それぞれに個性が生まれ、可能性が開ける、</p>
<p>それも良いだろう。</p>
<p>しかしながら、会社を統一したり、国民の財産を統一する、</p>
<p>そこには恐怖もあるが、同じだけ、出来る賢さもある。</p>
<p>しかし、評議会や共同体では何も出来ない。</p>
<p>独裁者の方が出来る、そういう発想もあるのだ。</p>
<p>ソ連とドイツが戦えば、アメリカと日本が戦う。</p>
<p>なぜ負けたのだろう。</p>
<p>帝国が勝つのが普通なのに、人民主義と民主主義に負けてしまった。</p>
<p>その後も、平等が自由に負けてしまった。</p>
<p>おかしなものが生まれた。アメリカ合衆国だ。</p>
<p>ソ連という発想は、悪い。自由、平等、独裁者、全て悪い。</p>
