<p>・鍵盤は、見なくても弾けるように、鍵盤と鍵盤の距離と感覚を指で覚える。特に、一度覚えたことは考えなくても弾けるようになるため、一小節ずつ、どんどん覚えていく。</p>

<h2>練習は進めるだけ進み、周りを自分に合わせるように</h2>
<p>ピアノやデザインについて言えるのは、教えてくれる先生は、自分の進歩状況に合わせて指導してくれる。</p>
<p>先生は自分に合わせて指導してくれるだけで、自分がどれだけ出来るのかは、自分がどれだけ先生の見ていないところで練習するかにかかっている。</p>
<p>だから、決まった通りやるのではなく、自分で進めるだけ進もう。それに対して先生は伸びる自分に合わせて教えてくれる。</p>
<p>そして、先生に合わせようとするのではなく、自分が練習するだけ練習して、その自分に周りを合わせるようにしていこう。</p>

<h2>電子ピアノの選び方</h2>
<p>電子ピアノの選び方について。出来るだけ、グランドピアノと同じ弾く感覚を目指した電子ピアノを買いましょう。</p>
<p>僕の経験から言って、グランドピアノは「ポーン」とハンマーを叩いて軽やかに音を出してくれますが、下手な電子ピアノを使っていると、とても弾きづらく、弾いたあとで疲れてしまいます。</p>
<p>僕は詳しくありませんが、ウェイテッド鍵盤やセミウェイテッド鍵盤が良いようです。ただ、僕は全く用語を知らないので、おかしなことを言っているかもしれません。</p>

<h2>不協和音にならないように留意する</h2>
<p>いつまでも間違った音を弾いてしまい、綺麗に弾けない、という方は、「不協和音にならないように留意して弾く」ということをすると良いでしょう。</p>
<p>自分の鍵盤が不協和音にならないようにすることで、自然に音を弾くポイントが分かります。</p>

<h2>上がっていくか、下がっていくかしかない</h2>
<p>作曲について言えるのは、「ドレミファ～」という上がっていくパターンと、「ドシラソ～」という下がっていくパターンの2つしかない、ということ。</p>
<p>もちろん、「ドミソ～」という間を飛ばしていくパターンや、「ドレシド～」という変則的なパターンはある。</p>
<p>だが、基本的に「ド」の次は「レ」となって上がっていくか「シ」となって下がっていくかだ。そこが分かると、作曲がしやすくなる。</p>
<p>絶対音感を習得することで、頭の中でメロディラインを言うことができるようになる。もっと頑張れば、楽譜を見なくても脳だけでピアノの鍵盤を弾くことができるようになるだろう。</p>
<p>作曲をする時だけではなく、初見で弾く時も、基本的に「上がっていくか下がっていくかしかない」と考えると、メロディを弾きやすくなる。初見でメロディを右手できちんと弾けるようになる。</p>

<h2>まず楽譜を読んで、それをその通り弾くだけ</h2>
<p>鍵盤をたたく前に、まず楽譜のメロディを読みましょう。それをその通り弾くだけです。「ソラシド」ならソラシドと弾きます。簡単です。</p>
<p>ピアノは簡単です。ただ、楽譜を読んで、そしてそれをその通り弾く。それだけなので、練習はそんなにたくさんしなくても、分かってしまえば簡単に弾けるでしょう。</p>

<h2>コード</h2>
<p>コードは、A(ラ), B(シ), C(ド), D(レ), E(ミ), F(ファ), G(ソ)とあり、この始まりの音から一音飛ばしで三音の和音を弾きます。たとえば、Cはドミソ。</p>
<p>弾く時に、和音の具体的な三音は、今弾いている指から近い場所に組み替えます。たとえば、ファラドはドファラにします。</p>
<p>また、和音が短調になる時に、m（マイナー）が付いている時は短調のままで弾き、ついていない時は、真ん中の音を半音上げて、長調に組み替えて弾きます。長調の和音にマイナーをつける時は、半音下げるなどして短調に組み替えます。</p>
<p>そして、7（セブン）は7音上の音、つまり最初の音から一音下の音を追加で弾きます。この時、一音追加すると4音になってしまうため、3つ目の音は無視します。</p>
<p>コードと鍵盤の具体的な例はネットにたくさんあるので、画像ファイルを探して印刷すると良いでしょう。</p>
<p>コードを覚えることで、簡単にメロディに伴奏（左手の演奏）をつけることができます。また、作曲する時にはコード進行を考えます。コードはギターの演奏などでも良く使い、楽譜には決まって五線譜の上に書いてあります。</p>
<p>僕のように、楽譜を見てメロディライン（右手）が弾けるピアノ中級者は、コードを覚えれば簡単に伴奏（左手）が弾けます。僕はまだコードのABCすら覚えられていませんが、頑張って練習したいと思っています。</p>

<h2>コードの覚え方</h2>
<p>最近、頑張ってAからGまでを覚えました。</p>
<p>僕の経験から言って、コードが覚えられない方は、「E（ミ）」を覚えると良いでしょう。BやDやFの音は、比較的覚えやすいAやCやGの音の隣にあると考えて、推測すれば覚えられます。</p>
<p>また、音をドミソの位置に組み替えるためには、「右端で折り返す」という発想をすると良いでしょう。Fであれば、ファラドの音の一番右にあるドを左に折り返して、ドファラを弾きます。鍵盤を見ながらやってみてください。</p>
<p>ですが、練習には修練が必要です。さまざまな楽譜を見ながら、特にマイナーやセブンの音も弾けるように、自分で鍵盤を叩きましょう。それにメロディを適当につけられるようになれば、もう既に作曲家です。メロディをつける時は、コードにある音を基本的に使うようにして、あとは気分で弾けば大丈夫です。</p>

<h2>和音は絶対的に読む</h2>
<p>ピアノを弾く上で、音符を読んでいく時、「上がっていくか・下がっていくかを見る」と「絶対的にその音符を見る」というやり方があります。右手のメロディラインを弾く際などには、上がっていくか下がっていくかを見ることで、初見でもすぐに右手を弾くことができます。</p>
<p>メロディラインは「上がっていく・下がっていく」で読めば良いのですが、和音は違います。和音は、逆に、絶対的にその音階を読みましょう。</p>
<p>僕は子供のごろから、上がっていくか下がっていくかで音符を読んでいたため、間違った場所の音を弾いたり、読むのに時間がかかったりすることがとても多く、すらすらと弾くためには覚えるしかありませんでした。</p>
<p>ですが、最近分かったことは、上がっていくか、下がっていくかと、音階を絶対的に読むかはバランスで、弾けないうちは絶対的に読んだ方が断然読みやすい、ということです。</p>
<p>特に、コードが分かってしまったあとでは、音階を絶対的に読めば簡単に伴奏がつけられます。コードとは関係なくても、たとえばジュピターのような和音の多い曲は、絶対的かつ単純に音を読めば、すらすらと弾けるようになります。</p>
<p>大切なのは、ヘ音記号ならラドミソを頭の中に入れることです。下の音階から、ラ・シ・ド・レ・ミ・ファ・ソ・ラをきちんと頭の中に入れましょう。きちんと覚えられたら、今度はさまざまな和音を読めるようになりましょう。ここに、上がっていくか下がっていくかは関係ありません。</p>
<p>ですが、メロディラインを弾く場合は、上がっていくか下がっていくかを考えることで、初見でもすらすらと音階とメロディを弾けるようになります。これは和音のあまり登場しない、メロディだけの曲に使えるでしょう。</p>

<h2>譜面の音は、コードの音が使われている</h2>
<p>譜面の音と、コードの音は関係しています。それは、譜面に書かれている音は、コードの音が使われていることが多いからです。</p>
<p>たとえば、Cのコードであれば、ドミソが使われていることが多いです。Fならば、ドファラが使われている可能性が多いでしょう。</p>
<p>それに気付くと、弾き間違いが少なくなります。また、初見で音を拾う時も、音を見つけやすくなります。</p>
<p>コードを左手で弾く際は、関連する音を全て弾く、という感覚で弾くと良いでしょう。Cならば、「ドとミとソをまとめて弾けば良い」と感覚的に分かることで、左手の伴奏は弾きやすくなるでしょう。</p>

<h1>コード</h1>
<h2>コード表</h2>
<p>基本的に最初の音からひとつずつ音飛びした三音の和音のことをコードと言います。楽譜では五線譜の上の方に書いてあります。ラがAで、順に一つずつ大きくなります。左手を付ける場合、左手を真面目に弾かなくても、コードを弾けばそれなりの音楽になります。メジャーは明るい和音（長調）、マイナーは悲しい和音（短調）です。また、セブンスは7音目の音を追加します。基本的にはメジャー、マイナー、セブンスのA, B, C, D, E, F, Gを覚えましょう。</p>
<p>実際は弾いている今の音やド・ミ・ソの近場の音に変換し、セブンスは三番目の音を省略することが多いです。Fであればファ・ラ・ドをド・ファ・ラに置き換えて弾きます。</p>

<tr><td>Gb F#</td><td>ファ#・ラ#・ド#</td><td>ファ#・ラ・ド#</td><td>ファ#・ラ#・ド#・ミ</td><td>ファ#・ラ#・レ</td><td>ファ#・ラ・ド</td></tr>

<p>（<a href="http://www.oj3an.com/?tid=5&mode=f15">ピアノコード一覧表 - 楽譜市場-中古楽譜買取 / 中古楽譜ネット販売専門店(古本一家)</a>を参考にしました。）</p>
<p>最低限覚えておくべきなのは、C、F、G（のメジャー）ではないかと思います。AmやC7なども良く出てくるので、頑張って覚えましょう。</p>
<p>最初のうちはセブンスはメジャーと同じ音を弾いても何とか聞こえます。あとはCでGと同じ音を弾くなどの荒業もあるので注意してください。</p>
<p>コードはピアノだけではなく、ギターなどにも通用する便利な技術です。ギターを弾く際は、コードを弾いて和音を出し、それに歌を歌って弾き語りをすることが多いです。</p>

<h2>調</h2>
<p>調は、楽譜の一番左に、それぞれの調として#や♭がついています。この#や♭がついている音階は、全ての音符に#や♭をつけて弾かなければなりません。上のA～Gのコードにイロハニホヘトという日本読みを付けて呼びます。長調（明るい音）と短調（悲しい音）の二種類があります。（ちなみにドレミファソラシはイタリア語の読み方です。）</p>
<p>たとえば、「Cメジャー」は「ハ長調」と呼ばれます。</p>
<blockquote class="inyou1">

<tr><td>♯４個の時</td><td>ファ・ド・ソ・レ</td><td>ホ長調(E)</td><td>嬰ハ短調(C♯m)</td></tr>
