<h1>Photoshop</h1>
<h2>写真補正</h2>
<p>特に、レベル補正と色調補正を中心にやりましょう。</p>
<p>レベル補正では、白と黒のバランスを変えることで写真を明るくできます。また、範囲を狭めることで白黒を引き締めることが出来ます。</p>
<p>色調補正では、ある狙った色を違う色調にすることが出来ます。黄色が多いなら、反対色の青を増やします。</p>

<h2>クリッピングパスで切り抜き</h2>
<p>写真の中で、人物だけを切り抜く必要が出てきた時は、まず、ペンツールでパスを引き、クリッピングパスにして、epsデータで保存します。</p>
<p>それを、Illustratorなどで配置する、と言う作業になります。</p>
<p>注意点は、白縁が生まれないように、出来るだけ内側にパスを引くことです。</p>

<h2>補正と切り抜きの基本</h2>
<p>まず、補正しなくて良い、適度に明るい写真なら、補正はしないことにこしたことはありません。補正をすると、本来の写真の色を破壊してしまいます。</p>
<p>室内で撮られた写真などで、明らかに暗い写真があった時に、写真補正をします。</p>
<p>主に、Photoshopのレベル補正という機能を使って補正をしていきます。</p>
<p>１．まず、写真全体を明るくします。レベル補正ならば、中央のバーを右（白）から左（黒）に移動させることで写真が明るくなります。少し明るいくらいが適切です。思い切って明るくしましょう。</p>
<p>２．次に、ハイライトを高めます。右端のバーを左に持っていくことで、それ以上右にある領域を白くすることが出来ます。これによって、写真が輝いて見えるようになります。ですが、やりすぎには注意しましょう。あまりやりすぎると、白トビ（その部分が真っ白になってしまうこと）が発生します。この白トビは、あとでヒストリーブラシを使って直します。</p>
<p>３．次に、黒を引き締めて、コントラストを付けます。左端のバーを右に持っていきます。これによって、黒が強くなります。ただ、やりすぎるとバキッとした写真になるので注意しましょう。</p>
<p>４．黒を引き締めると全体が暗くなるので、もう一度全体を明るくします。</p>
<p>５．室内で撮られた写真などでは、黄色っぽい写真になることが多いです。この場合は、イエローの出力レベルを下げてあげましょう。全体が黄色から反対色の青に近くなります。</p>
<p>６．また、人間の顔や表情など、ある部分だけの色を変えたい時は、色調補正を行います。これによって、人間の顔の部分を少し赤みがかった写真にすることが出来ます。</p>
<p>７．そして、白トビしたりしている部分を、ヒストリーブラシで直します。この時、ブラシが透明度100%で固さ100%になっていないと、ブラシの跡が残るので注意してください。ブラシの大きさを変えながら、丁寧に仕事をします。</p>
<p>８．大切なこととして、Illustratorなどで写真を配置した後のデータがある時などは、そのデータを開いておいて、全体の全ての写真が調和し、明るすぎる写真が混ざっていないか、クリッピングなどをかけた時におかしく見えないかを良く確認しながら行いましょう。</p>
<p>配置のポイントとして、元の写真をCMYKにすること、また解像度を300程度にして大きさは拡大縮小した配置画像のサイズより小さくならないよう適切に行うことが必要です。</p>
<p>また、写真の切り抜きのポイントとして、</p>
<p>１．白背景の縁が生まれないように、ペンツールは内側にパスを引くこと</p>
<p>２．領域が良く分からない時は、綺麗に見えるようにデザイナーの方で作ってやること</p>
<p>３．パスの調節は、部分的に選択した上でカーソルキーを使って徐々に動かすこと</p>
<p>がコツだと思います。</p>

<h3>レベル補正の原理</h3>
<p>上のやり方が明らかに間違っていたことが分かったので、加筆します。</p>
<p><a href="../../diary/2017.11.06.html">2017-11-06</a>より。</p>
<p>レベル補正についてきちんと勉強した。山の両端を引き伸ばすことで、黒と白の範囲をきちんと合わせて、正しい階調の写真にすることが出来る。</p>
<p>写真は、一番明るいところから一番暗いところまであるが、暗い写真を撮った時には、写真全体が暗い領域に偏る。これを全体に引き伸ばすことが出来るのが、レベル補正だ。</p>
<p>レベル補正は、真ん中で全体を明るくしたり暗くしたりする。そして両端を変えると、そこが黒と白の終点になる。</p>

<h3>他のやり方</h3>
<p>上のようにやる以外にもやり方はあって、例えば自動選択ツールでマスクを設定して切り抜いたり、クイック選択ツールで一部分だけをレベル補正することも出来ます。</p>
<p>また、写真補正は他にもさまざまな方法を使います。</p>
<p>特に、逆光が強い写真では、シャドウ・ハイライトを使って、陰の部分や光の部分を抑え、全体の明るさを均一にすることが出来ます。</p>

<h3>レベル補正のコツ</h3>
<p><a href="../../diary/2018.01.05.html">2018-01-05</a>より。</p>
<p>レベル補正のコツ。まず、ヒストグラムには画像の明るさの分布がある。白と黒の両端のバーは、明るさの端を決め、画像の明るさを引き伸ばす。ヒストグラムで一定の範囲に固まっている場合、コントラストが低いので白と黒を引き締める。全体にある場合は、コントラストが高いので、真ん中だけを動かす。</p>
<p>だが、この方法でレベル補正をすると、明るすぎる写真になるので、注意が必要だ。</p>

<h3>レベル補正のコツ２</h3>
<p><a href="../../diary/2018.01.09.html">2018-01-09</a>より。</p>
<p>レベル補正は、真ん中を変えて明るくすると淡くなり、両端を変えるとコントラストが高くなる。また、真ん中は全体が明るくなり、両端は明るい部分を明るく、暗い部分を暗くできる。僕は、全体を明るくして、暗い部分をはっきりさせてレベル補正をしている。</p>

<h3>レベル補正のコツ３</h3>
<p>最近の僕がやっているのは、</p>
<p>１．全体を思い切って明るくするために、中間点を（全体が白っぽくなるまで）明るくする。</p>
<p>２．黒を引き締めることで、明るくした部分にコントラストをつけて暗くする。</p>
<p>３．白を引き締めることで、バランスを取る。</p>
<p>とするか、あるいは、</p>
<p>１．全体を控えめに明るくするために、中間点を（全体が白っぽくならない程度に）明るくする。</p>
<p>２．白を引き締めることで、コントラストをつけながらさらに明るくする。</p>
<p>３．黒を引き締めることで、バランスを取る。</p>
<p>とするのが良いように思います。</p>
<p>ただ、このようにすると、顔や首元に黄色が出たり、唇が赤すぎるようになったり、服の色がビビットになったりします。</p>
<p>この時は、クイック選択ツールを使ってその場所だけを選択し、「色相・彩度」を使ってイエロー系の色を低彩度・高明度にすることで、黄色を自然に消すことが出来ます。</p>
<p>唇も、唇の部分だけを選択し、今度はレベル補正でマゼンタを抜いてやることで、自然なままで色を抑えられます。</p>
<p>ビビットになった服の色も、色相・彩度で低彩度・高明度にしましょう。</p>
<p>選択範囲を選んでから調整レイヤーでレベル補正や色相・彩度を使うと、自動的にマスクが設定されますが、このマスクの境界線をぼかすことで、色を変えた時に自然な境界になります。フォトショップの機能は多いので、僕はまだ全機能の1割も知らないと思います。</p>

<h3>レベル補正のコツ４</h3>
<p>大量の写真がある場合は、最初の写真のレベル補正で数値を覚えておいて、その数値を目安にしながら調整してレベル補正を行うと、どの写真も明るさの調和した綺麗な写真たちにすることが出来ます。</p>

<h3>レベル補正のコツ５</h3>
<p><a href="../../diary/2018.02.28.html">2018-02-28</a>より。</p>
<p>今日の作業所では、本を使ってIllustratorの練習をした。パンク・膨張、変形効果、長方形グリッドツール、同心円グリッドツールやシェイプ作成ツールなどを使って、パターンデザインの練習をした。 </p>
<p><a href="../../diary/2018.03.01.html">2018-03-01</a>より。</p>
<p>レベル補正は、全体を明るくし、暗くし、白を増やし、黒を増やす、と理解すると良いだろう。</p>
<p>今日は、Illustratorに関して、ブレンド、グラデーションメッシュ、グラデーションツールなどの使い方を知った。</p>
<p>あとは、不透明の乗算の使い方を少し知った。</p>

<h3>シャドウ・ハイライト</h3>
<p><a href="../../diary/2018.03.02.html">2018-03-02</a>より。</p>
<p>シャドウ・ハイライトは、写真の陰や光の明るさを均一にする。シャドウは陰、ハイライトは光の部分が変わる。著しく暗い陰の写真に使うと良い。</p>
<p>シャドウ・ハイライトは、レベル補正の前の下地を作るのに使うと良い。</p>

<h3>トーンカーブ</h3>
<p>僕は今まで作業所ではレベル補正を中心に写真補正技術を習ってきましたが、本やネットの話を聞くと、もっと高度・柔軟で一般的な「トーンカーブ」という機能があるようです。</p>
<p>レベル補正では、バーを動かすことによって写真のコントラストと明るさを変えてきましたが、トーンカーブでは、これを一つのグラフ的な曲線で、それにポイントをつけて曲線的に動かすことで、明るさの調整を行います。</p>
<p>2018.03.06時点で僕はまだトーンカーブは出来ていませんが、やることは同じです。コントラストをつけて明るくするために始点と終点を動かし、バランス良く明るくするためにカーブを動かします。違うのは、カーブと点をいくらでも柔軟に動かすことができるところだと思います。これによって、どこをどのように明るくするのか、厳密で柔軟な操作が可能となります。</p>

<h3>色調・彩度</h3>
<p>ここであまり説明できなかった技術として、色調・彩度があります。</p>
<p>特に、写真を一気にレベル補正で明るくすると、黄疸が出来ることがあります。</p>
<p>こういう時、レベル補正の色の出力レベルを下げることでも調整はできますが、たとえば黄色っぽい写真を彩度を下げてグレーに近くしたり、明度を上げて白に近くすることで、黄色や、たとえば赤くなりすぎた口の周りなどを消すことができます。</p>
<p>色調・彩度を使うコツは、狙った色だけを変えられるように、あまり幅広く色を選ばないことです。黄色を変えたいだけなのに、肌色まで変わってしまうと写真としての見栄えが悪くなります。だからといって特定の色だけを選択すると、今度はまだらが出来ることもあります。</p>
<p>解決するためには、Photoshopの「クイック選択ツール」を使うこともできます。狙った色だけではなく、狙った場所に焦点を合わせることで、レベル補正の後で写真のおかしくなった部分だけを直すことができるでしょう。</p>

<h3>トーンカーブの基本</h3>
<p>まず、対角線よりも上に持ってくると画像は明るくなる。下に動かすと画像は暗くなる。</p>
<p>だが、レベル補正とは違い、「その明るさの部分を明るく（暗く）する」という細かい調整が可能で、特定の点を指定して画像を明るくすることも出来る。</p>
<p>また、カーブが急になっているところはコントラストが強くなる。カーブが緩やかになっている部分はコントラストが弱くなる。</p>
<p>ヒストグラムだけではなく、X軸とY軸を見ることで、どの明るさの部分がどれだけ高く（低く）調整されているかを見ることができる。</p>

<h1>ベジェ曲線でパスを描く</h1>
<h2>基本</h2>
<p>ベジェでパスを描く時は、コツが要ります。出来るだけ、ハンドルを伸ばし、アンカーポイントを少なくします。</p>
<p>コーナーポイントとスムーズポイントを上手く使い分けながら、Altで折り返したりしていると、すぐに綺麗なパスが引けるようになります。</p>
<p>ペンツールでパスを描く練習をするためには、企業のロゴをなぞったり、カープ坊やのような簡単なイラストをなぞったりして、画像トレースの練習を行うと良いでしょう。</p>

<h2>綺麗なパスをペンツールで引くコツ</h2>
<p>線を単純になぞるようにハンドルを伸ばしたり、正確性を重視してアンカーポイントを増やしたりしてしまうと、パスがいびつになってしまって、汚い線になってしまいます。</p>
<p>綺麗なパスを引くコツとして、</p>
<p>１．ハンドルを思い切って外側に長く伸ばすこと</p>
<p>２．要らないアンカーポイントは削除すること</p>
<p>３．曲線の部分を丁寧に作って、同じ曲線の部分に複製すること</p>
<p>が挙げられると思います。</p>
<p>ペンツールだけではなく、フリーハンド系のツールを使うことも出来ます。塗りブラシツールを使えば、ある部分を塗りつぶすようにブラシで塗っていくことでパスオブジェクトを作ることも出来ます。ブラシツールとブラシを使うことで、手書きしたパスにさらに毛筆のような表現をすることも出来ます。</p>

<h2>ベジェ曲線の描き方</h2>
<p>ベジェ曲線とは、この表現で分かるかは分からないが、要は、「曲線をハンドルで釣り上げる」ことだ。</p>
<p>釣り上げる、という表現が重要だ。一つのベジェ曲線には、両端の二つのハンドルがあるが、これを外側にどれだけの長さで、どれだけの角度で伸ばすかで、曲線の曲がり方が変わってくる。</p>
<p>だが、頭で理解するのは難しい。中学三年で習った数学の「二次曲線」を思い出してほしい。あんな感じで、放物線のように曲線が伸びる。その上で、それを角度を強く、弱くし、大きさや長さを長く、短くする。それが、僕の言う、「釣り上げる」の意味だ。</p>
<p>これを読んだだけでは分からないと思うが、ベジェ曲線は曲線を釣り上げながらハンドルを作っていくことで綺麗なパスが描ける。僕も、もう作業所に行き始めて1年と4か月ぐらいが経つが、やっと描き方が分かった。ただ、「釣り上げるように」描けば良い。今までは、そういう風に考えることが無く、綺麗なパスが描けるようになったとは言っても、簡単なイチゴの輪郭すら描けなかった。やっと描けると思う。</p>
<p>どうでも良いが、最近一番良く使うのは、グラデーション、ぼかし、そしてリフレクトとシアーだ。文字オブジェクトに使うことで、文字がとても綺麗にデザインできる。（2018.03.29）</p>

<h2>アンカーポイントは角ではなく直線にも</h2>
<p>アンカーポイントは角に付ける人が多いと思うが、ベジェ曲線という特性から考えて、直線部分にアンカーポイントをつけて、綺麗な曲がり角をハンドルで作る、というやり方も僕は良いと思います。</p>
<p>パスは、「考えて引く」こと、それが鉄則です。適当に何も考えず引くのはやめて、考えながら引きましょう。</p>

<h2>ベジェ曲線は直線の「膨張」である</h2>
<p>ベジェ曲線は、「膨張させる」という表現をすると良いかもしれません。直線をある方向に膨張させることで曲線を描く。それがベジェ曲線です。</p>

<h1>基本操作</h1>
<h2>これだけは覚えてほしい基本操作</h2>
<p>まず、スペースキーとドラッグで手のひらツールでアートボードを動かすことができます。</p>
<p>また、Ctrl＋スペース＋クリックで拡大、Ctrl＋Alt＋スペース＋クリックで縮小できます。</p>
<p>選択ツール（黒矢印）でクリックすることで、オブジェクトを選択できます。ダイレクト選択ツール（白矢印）でクリックすることで、パスのアンカーポイントやハンドルだけを選択できます。Shift＋クリックで複数のオブジェクトやアンカーポイントを選択できます。</p>
<p>ペンツールでベジェを描いている時は、最後のアンカーポイントをクリックすることで、ハンドルをキャンセルできます（パスを曲線ではなく直線として描画できる）。また、ベジェの描画中にCtrl＋クリックをすることで、パスの描画を終了することができます。</p>

<h2>図形ツール</h2>
<p>四角形ツールや楕円形ツールは、Shiftを押しながらドラッグすることで正方形や正円を作成できます。</p>
<p>また、Altを押しながらドラッグすることで、中心から四角形や楕円形を描くことができます。</p>
<p>拡大縮小を行う時は、Shiftを押しながら拡大縮小することで縦横比を維持したままで拡大縮小ができます。また、Shiftを押しながら移動することで、縦横の延長線を維持したまま移動できます。</p>
<p>Altを押しながら移動することで、オブジェクトをその位置に複製することができます。</p>

<h1>基本的ワークフロー</h1>
<h2>パスに色をつける</h2>
<p>パスは、線と塗りで色を付けることが出来ます。線は一つだけではなく、アピアランスを追加することで、無限に線を引けます。</p>
<p>また、パスのアウトラインをとったり、分割・拡張を行うことで、線を塗りに変換することも出来ます。</p>
<p>アピアランスには、それぞれに項目に効果を設定できます。そのため、外枠の線だけにぼかしをつける、などという使い方も可能です。</p>

<h2>トレース作業</h3>
<p>デザイン業務の習熟には、既にあるイラストや広告などを、自分で真似て作る「トレース」と言う作業が有効です。</p>
<p>まず、JPGなどのファイルをepsにしてIllustratorのアートボードに配置します。そして、1つ1つの線と塗りをパスにしていきます。</p>
<p>ペンツールで、なぞるように綺麗にパスを引いてあげましょう。</p>
<p>輪郭は、パスとパスの重なり合いによって、例えば服の袖から腕が出るように、重なり合いを上手く利用して、「1つのイラスト」を描くことが出来ます。</p>

<h2>レイヤーと重なり合い</h2>
<p>レイヤーと重なり合いを上手く使って、整理整頓された環境で作業しましょう。</p>
<p>また、「同じ位置にコピーする」ことを上手く使うことで、クリッピングマスクをかけることが楽に出来ます。前面コピーや背面コピーのような機能もあります。</p>
<p>レイヤーを非表示にすることやロックをかけることも出来ます。他人のデータをコピーする時は、相手のレイヤー分けをそのままコピーするか、のような設定を指定することも出来ます。</p>
<p>レイヤーはAltを押しながら展開することで全展開でき、展開した状態でAltを押しながら閉じることで全て閉じることができます。</p>
<p>どこにどんなオブジェクトがあるか分からない時は、Ctrl+yでアウトライン表示にできます。アウトライン表示では、全てのオブジェクトの輪郭が細い白黒で表示されます。また、Alt+目玉をクリックで未選択のレイヤーを全て非表示に、Alt+Ctrl+目玉をクリックで、その他をアウトライン表示にすることができます。</p>

<h1>レイアウトと基本操作</h1>

<h2>パスファインダー、クリッピングマスク、アウトライン、オフセット</h2>
<p>パスとパスの関係から、新しいパスを作ってくれる機能です。</p>
<p>パスファインダーは、パスとパスを切り抜いたり合体させたりしてくれます。</p>
<p>クリッピングマスクは、写真のようなデータをパスで切り抜くことが出来ます。</p>
<p>アウトラインは、文字や線などを塗りを設定するパスにすることが出来ます。</p>
<p>オフセットは、そのパスよりも一回り大きい・小さいパスを作ってくれます。</p>

<h2>グループ</h2>
<p>いっぺんに移動や拡大などの操作をしたいオブジェクトは、グループに設定することが出来ます。</p>
<p>オブジェクトは、ダブルクリックでグループ編集モードの中に入ったり、Ctrlキーを使うことでグループ内のオブジェクトを選択したり、Shiftキーを使うことで複数のオブジェクトを選択したりすることも出来ます。また、Altキーを押しながらオブジェクトをドラックすると、そのオブジェクトをその位置にコピーしてくれます。Ctrl+Dを使うことで、一度やった動作をもう一度繰り返すことが出来ます。</p>
<h2>整列</h2>
<p>整列機能を使うことで、オブジェクトの端を合わせたり、等間隔で並ばせたりすることも出来ます。</p>
<p>オブジェクト同士を整列するだけではなく、アンカーポイント同士を整列させることで、整理された綺麗なパスオブジェクトを作ることも出来ます。</p>

<h2>回転、拡大縮小、移動など</h2>
<p>パスを回転したり、拡大縮小することが出来ます。そして、変形の繰り返しと言う機能を使うことで、たとえばハートを回転させながら４つコピーする、などが出来ます。</p>
<p>パターンを移動し、拡大縮小したり回転したりすることによって、単純なパターンから多様なテクスチャを作ることが出来ます。</p>
<p>回転や拡大縮小をする時は、基準点を設定することで、その基準点を中心に回転や拡大縮小をかけることができます。九つの点から選ぶ方法や、回転ツールや拡大縮小ツールでAltを押しながらクリックして設定する方法があります。</p>

<h2>テキストボックス</h2>
<p>テキストを配置し、それをデザインします。パスを描くよりも、こちらの方が使用頻度として多いかもしれません。</p>
<p>ワードでは出来ないような、高度なデザインが可能です。</p>
<p>カーニングを設定することで、文字と文字の間を自動で字詰することが出来ます。Alt+→やAlt+←で、手動で文字ごとに字詰を行うことも出来ます。また、両脇揃えにする（文字の両端を綺麗にしてくれる）ことや、一段階文字を下げたりすることも設定から出来ます。</p>
<p>縦書きも可能です。縦書きをする時は、欧文を横書きではなく縦書きにしたり、縦中横（12月といった数字などを含む文章で、12だけを横書きとして縦書きの中に入れる）といったことをすることも出来ます。</p>
<p>配置したテキストは、アピアランスから新しい線を設定し、文字や塗りよりも下に置くことで、縁取りをすることも出来ます。</p>
<p>テキストボックスには二種類あって、ロゴや吹き出しに使う文字のようなテキストとワープロのような文章のテキストは別のツールを使います。これはダブルクリックで切り替えます。</p>
<p>テキストは回り込みをしたり、複数のテキストボックスに対して一つの文章を流し込むように設定したりすることも出来ます。また、アーチのような効果をかけることで、ロゴのようなテキストを綺麗に作ることが出来ます。</p>
<p>フォントによっては、太さの異なるファミリーが用意されていることがあります。ロゴやタイトルに使うフォントの場合は、ボールドやヘビーのような太いフォントファミリーを使いましょう。</p>
<p>パス上文字を使うことで、アーチだけではなく、パスの輪郭になぞらえるようなテキストを表現することも出来ます。特に、円オブジェクトを背景にパス上文字を使うことで、メダルのような円形に対する文字をなぞらえることもできます。</p>

<h2>ロック</h2>
<p>オブジェクトはCtrl+2でロックすることができます。ロックしたオブジェクトは編集できなくなり、選択もされなくなります。</p>
<p>オブジェクトの上で作業したい場合や、ある特定のオブジェクトだけ作業対象から除外したい場合に、Ctrl+2を使うと便利です。</p>
<p>オブジェクトのロックを解除するためには、全てのロックを解除を使います。</p>
<p>レイヤーパネルから、レイヤーごと全てロックすることもできます。これは、上のCtrl+2とは別扱いです。全てのロックを解除をしても、レイヤーのロックは解除されません。注意してください。</p>

<h1>綺麗なデザイン</h1>
<h2>パターンやグラデーション、透明度など</h2>
<p>塗りを単色ではなく、パターンやグラデーションにすることも出来ます。透明度を設定することで、品のあるデザインに出来ます。</p>
<p>パターンを作ることで、簡単に見栄えの良いデザインを作ることが出来ます。</p>
<p>パターンを編集するために、パターン編集モードを上手く活用しましょう。</p>
<p>グラデーションは、グラデーションツールを使うことで、円形のグラデーションの位置などを動かすことができます。これによって、美しい金属や水の球体を表現できます。</p>

<h2>効果やエンベロープなど</h2>
<p>効果やエンベロープなどを使うことで、パスをそのままで表示結果を綺麗に出来ます。特に、ドロップシャドウを付けることが多いかもしれません。</p>
<p>特に使うのは、ぼかし、ドロップシャドウ、光彩などですが、他にもジグザグのようなパスを可愛くしてくれるものや、粒状フィルムのような少しテクスチャ的なものを作ることも出来ます。</p>
<p>また、重くて読み込みに時間のかかるパスや効果のデータは、ラスタライズすることで小さく出来ます。</p>
<p>パスのオフセットを取って、パスの輪郭をつけたいような場合に、オブジェクトの形状変更（コピー）から行うことも出来ますが、アピアランスから効果で行うことも出来ます。角丸長方形ツールやライブコーナーを使う代わりに、「角を丸くする」などの効果をアピアランスからかけることも出来ます。どちらを使うかは場合によります。たとえば文字の輪郭を取るような場合、アウトラインを取ってオブジェクトの変形で行うことも出来ますが、アピアランスから効果でオフセットを取った方が楽です。</p>
<p>エンベロープは、「最前面のオブジェクトで作成」を実行することで、文字をパスのシルエットと同じ形に変形することができます。とても便利な機能です。</p>

<h1>レイアウト</h1>
<h2>スマートガイドなど</h2>
<p>スマートガイドを有効にすると、線と線をぴったりと引っ付けてくれたりして、色んなことをスマートにガイドしてくれます。</p>
<p>また、ガイド機能を使うことで、補助線を引いてデザインを作ることも出来ます。</p>

<h2>四角形と段組設定</h2>
<p>四角形ツールを使う場面は、ただ四角形の図形を描くだけではなく、ベタ（単色の背景）をつける時や、クリッピングマスクをつけるときにも使います。</p>
<p>四角形ツールは、ライブコーナーを使うことで、角丸四角形（角の丸い四角形）を作ることが出来ます。これをクリッピングマスクに応用すると、写真を角丸にすることが出来ます。</p>
<p>また、カレンダーのような表を作る時に使う段組設定（同じ大きさの四角形を均一に作ってくれる）を使いながらクリッピングマスクをかけることで、写真全てを同じ大きさでトリミングすることも出来ます。</p>
<p>段組設定でスレッドテキストを使えば、簡単に表にテキストをつけることが出来ます。</p>

<h2>シンボル</h2>
<p>たくさんの場面でコピーして良く使うオブジェクトは、シンボルに登録しましょう。</p>
<p>シンボルに登録することで、インスタンス（シンボルに登録したオブジェクトのコピー）をいっぺんに編集・変更することができます。</p>
<p>これはとても便利な機能です。</p>
<p>カレンダーなどを作る時、日付の枠のようなものをデコレーションして作ることがあると思いますが、単純にコピーすると、31日分を後で編集・変更することがとても大変になります。</p>
<p>一つをシンボルに登録して、そのインスタンスを31日分配置すれば、簡単に31日分のオブジェクトを編集することができます。</p>

<h1>文字・テキスト</h1>
<h2>文字をいじる</h2>
<p>文字をいじるためには、文字データにアウトラインをかけて、文字をパスに変換します。</p>
<p>パスファインダーなどを有効に使うことで、文字データにパスデータを合体させることが出来ます。</p>
<p>また、アウトラインをかけなくても、テキストに効果をつけることで、文字を上手く加工することも出来ます。</p>
<p>文字を簡単に操作する時は、文字タッチツールを使うこともできます。一見小さな機能に見えて、文字タッチツールはとても便利な機能です。オブジェクトと同じように、文字を拡大したり、回転したり、移動したりすることができます。ぼかしやドロップシャドウの効果と組み合わせることで、とても綺麗な文字を作ることができます。また、変形効果などを組み合わせ、文字にグラデーションなどをかけることで、出来ることは広がっていきます。</p>

<h2>文字デザインの注意点</h2>
<p>テキストを配置する時は、カーニングの設定を確認しましょう。カーニングを自動にすることで、文字を自動的に詰めてくれるようになります。また、アキをベタにすることで、点や丸を入れる場合に文字をつめてくれます。</p>
<p>綺麗な文字デザインをしたい時は、段落を両端揃えにすることで文字の両脇をきちんと綺麗に整えてくれます。また、字間を調整することで、文字を段落の中に入れ込み、あるいは外に出して、飛び出す部分を少なくすることができます。字詰めのことをカーニング、字間のことをトラッキングと言います。</p>
<p>文字に白縁を付ける場合は、角の形状を丸みを帯びたラウンド結合にしましょう。飛び跳ねのない綺麗な縁にすることができます。</p>
<p>文字にアピアランスでたくさんの線をつけることで、何重にも白縁をつけることができます。ドロップシャドウやぼかしと組み合わせながら、シアーをかけたり、文字タッチツールで文字を躍らせることで、綺麗な文字デザインをすることができます。塗りを楕円形や四角形に変形して文字の背景にしたり、グラデーションをかけたりしても良いでしょう。文字や背景ベタにグラデーションをかける場合は、重力の法則に従い、上の方を薄く、下の方を濃くするのが定石です。</p>

<h2>Typekitは意外と量が少ないので自分で導入してみよう</h2>
<p>Typekitにはさまざまなフォントがあるが、ジャンルで分けて見ると、意外と少ない。</p>
<p>インストールできる量にも余裕があるので、実際にフォントをインストールして、その上で確認してみよう。</p>

<h2>Typekitでおすすめのフォント</h2>
<p>VDL（視覚デザイン研究所）のフォントはとても多様で使い勝手が良いのでおすすめです。VDL系のフォントを一通り入れると、デザインする時に簡単に使えます。他には漢字タイポスなど。</p>
<p>意外と英文フォントにも使えるフォントがあります。Segoe ScriptやSheilaはおすすめです。</p>

<h2>ブラシ・パターンライブラリ</h2>
<p>最初から入っているブラシとパターンを、ライブラリから呼び出して使うことが出来ます。筆のようなイラストを書けます。</p>
<p>また、ブラシを使ったり、直線的なパスをブラシに指定することで、さまざまな直線を使うことが出来ます。</p>
<p>色使いが難しい時は、スウォッチライブラリに頼ることも出来ます。さまざまな色使いが既に登録されています。下のオブジェクトを再配色を使っても良いでしょう。</p>
<p>たとえば、オブジェクトを再配色を使って7つの直線的な長い四角形に色をつければ、簡単に虹色のブラシが作れます。この虹色のブラシを使って半円にブラシを適用し、パスに沿った綺麗な虹を作ることができます。</p>
<p>オブジェクトを再配色とスウォッチライブラリを使うことで、たとえば迷彩服の緑、茶、灰色などの色を使ったオブジェクトを簡単に別の色使いに変えたりすることもできます。</p>

<h2>オブジェクトを再配色（ライブカラー）</h2>
<p>オブジェクトを再配色（ライブカラー）を使うことで、補色やトライアド・テトラードの色使いを簡単に設定することが出来ます。</p>
<ul>
<li><a href="http://kohtguchi.at.webry.info/201008/article_6.html">Illustrator（イラストレーター）で補色 - Illustrator（イラストレーター）入門</a></li>
</ul>
<p>トライアドやテトラードとグラデーションを組み合わせることで、虹色のような豊かなグラデーションを実現することも出来ます。</p>
<p>補色や色の組み合わせを効果的に使うことで、見栄えの良いデザインを簡単に作ることも出来ます。</p>
<p>オブジェクトの再配色は、再設定の機能もあって、トライアドやテトラードの関係を保ったままで色使いをさまざまに変えることも出来ます。</p>
<p>色の関係をリンクしたままでさまざまな再配色をすることで、パターンや素材なども、簡単に色使いを変えることが出来ます。</p>
<p>トライアドやテトラードの配色は、カラーガイドパネルからも行うことが出来ます。</p>
<p>オブジェクトを再配色（ライブカラー）とカラーガイドは、僕の一番好きな機能です。簡単に全体の色使いを変えられます。僕は「色使いが上手だ」と良く言われますが、センスがあるわけではなく、オブジェクトを再配色やカラーガイドなどを使って簡単にやっているから、必然的に言われるだけです。</p>

<h2>スポイトとグラフィックスタイル</h2>
<p>画面から特定の色を取ってきたい時は、スポイトツールが使えます。設定することで（ボタンをダブルクリックで設定出来る）、アピアランスや効果なども含めてコピーすることが出来ます。簡単に作業効率を上げることが出来ます。</p>
<p>また、グラフィックスタイルに特定のスタイルを登録して適用したり、アクション機能（ある作業を記録して同じ作業を自動化出来る）を使うことも出来ます。全てのファイルに同じ処理を行うバッチ機能もあります。</p>
<p>良く使うアートワークはシンボルに登録することで、全てのインスタンスをいっぺんに編集適用することも出来ます。</p>

<h2>カラーガイド</h2>
<p>色使いが難しい、といった時は、カラーガイドを使いましょう。</p>
<p>カラーガイドを使うことで、補色やテトラード、あるいは同一トーン配色など、効果的で美しい色使いを簡単に選ぶことができます。</p>
<p>ライブカラー（オブジェクトを再配色）やスポイト、グラフィックスタイルも効果的に使いましょう。</p>
<p>特に、グラフィックスタイルを使うことで、簡単に同じアピアランスを適用させることができます。これはシンボルと良く似た機能です。</p>

<h2>パスファインダーの「分割」とライブペイントで自由自在に色を塗る</h2>
<p>パスファインダーで最も良く使う機能は「分割」です。パスを境界線が交わった全ての場所でバラバラにしてくれます。</p>
<p>分割を上手く使うことで、オブジェクトに光沢や陰影を表現することができます。二次元のイラストにあるような「光の加減」を表現できます。</p>
<p>文字に分割をかける時は、事前にアウトラインを作成します。アウトラインを作成する時は、必ず元の文字データをアートボードの外側に残しておきましょう。</p>
<p>また、ライブペイントを使うことで、もっと自由に色をつけることができます。ライブペイントは、パスの全ての境界線上で、線と線の内側に出来た範囲に自由に色を塗ることが出来ます。ライブペイントを使うためには、メニューからライブペイントを作成し、ライブペイントツールを使います。</p>
<p>他には、描画モードを使う方法があります。</p>
<p>これらの機能を使うことで、イラストの光の加減や陰影を表現出来るほか、グラデーションだけでは表現できない、複雑な形の色の塗り分けをすることができます。</p>
<p>パスファインダーの分割を使ってアウトライン化された文字データをバラバラにすると、色々と面白い表現ができます。それぞれの色を変えてみたり、切り抜いたりしてみるのも良いでしょう。</p>

<h1>効果とアピアランス</h1>
<h2>効果やエンベロープなど</h2>
<p>効果やエンベロープなどを使うことで、パスをそのままで表示結果を綺麗に出来ます。特に、ドロップシャドウを付けることが多いかもしれません。</p>
<p>特に使うのは、ぼかし、ドロップシャドウ、光彩などですが、他にもジグザグのようなパスを可愛くしてくれるものや、粒状フィルムのような少しテクスチャ的なものを作ることも出来ます。</p>
<p>また、重くて読み込みに時間のかかるパスや効果のデータは、ラスタライズすることで小さく出来ます。</p>
<p>パスのオフセットを取って、パスの輪郭をつけたいような場合に、オブジェクトの形状変更（コピー）から行うことも出来ますが、アピアランスから効果で行うことも出来ます。角丸長方形ツールやライブコーナーを使う代わりに、「角を丸くする」などの効果をアピアランスからかけることも出来ます。どちらを使うかは場合によります。たとえば文字の輪郭を取るような場合、アウトラインを取ってオブジェクトの変形で行うことも出来ますが、アピアランスから効果でオフセットを取った方が楽です。</p>
<p>エンベロープは、「最前面のオブジェクトで作成」を実行することで、文字をパスのシルエットと同じ形に変形することができます。とても便利な機能です。</p>
<p>Illustratorの基本機能が分かってしまうと、効果を使うのが楽しくなります。たとえば、「ラフ」や「ジグザグ」を四角形に適用することで、少し可愛らしくいじったタイトルのようなものを作ることができます。ほかには、「パンク・膨張」などを上手く使うことで、四角形を少しゆがめて、丸みを帯びたタイトルを作ることができます。</p>

<h2>アピアランスの高度な使い方</h2>
<p>アピアランスは、高度な効果を使うことで、オブジェクトをパスによって編集するのと同じぐらいの編集能力を発揮します。</p>
<p>たとえば、テキストオブジェクトに塗りや線を設定して、効果から「楕円形」に変換することで、テキストに簡単な円の丸の背景を作ることができます。</p>
<p>アピアランスで作った効果は、移動をするために「変形」効果を使います。簡単にドラッグでは移動できません。ですが、使いこなすことで、柔軟で効果的なデザインを行うことができます。</p>

<h2>アピアランスの優先度</h2>
<p>アピアランスには優先度がある。文字なら、まずグループのアピアランス、次に塗りと線のアピアランス、そしてその次にそれぞれの文字の色のアピアランスがある。</p>
<p>優先度を分かっていないと、色を設定したつもりでも、その色が実際には他のアピアランスの下に来てしまって、見えなくなる時がある。</p>
<p>アピアランスの優先度は固定ではなく、並び替えることで変えることが出来る。</p>
<p>僕も、テキストの色の優先度などは適当にやっていたため、他人に教えようとした時に分からなくなってしまうことがあった。</p>

<h2>アピアランスを分割、分割・拡張</h2>
<p>ラフなどで作った効果の輪郭は、アピアランスを分割を行うことでパスデータに変換できます。このパスデータをクリッピングマスクなどに使うことができます。</p>
<p>分割・拡張も似たような機能ですが、アピアランスのそれぞれの項目をバラバラにして、アウトラインをかけたようにそれぞれの線データを塗りのオブジェクトのデータにすることができます。</p>
<p>パスのアウトラインも似たような機能です。線（直線）のようなデータを、輪郭を取った四角形のパスに変換することができます。</p>
<p>文字データを扱う時は、フォントが入っていない環境などで開くことを想定して、文字のアウトラインをかけたアウトラインデータを作ります。</p>

<h2>デザインの秘訣は効果とアピアランスにあり</h2>
<p>僕は、デザインが上手くなる秘訣は、効果とアピアランスにあると思っている。特に、「ラフ」や「角を丸くする」のような効果のデザインは、簡単に綺麗なチラシやポスターを使う場合に多用するし、パターンは描画モードと組み合わせて使うことで綺麗なデザインを簡単に作れるようになる。</p>
<p>アピアランスの活用は重要で、ある意味パスのオブジェクトは「平面的に」デザインを作るが、アピアランスの効果は「計算的に」デザインを作る。その違いは重要で、どちらを使えば正解というものではなく、要所要所によって、あるいは自分の今のやりたいように、パスあるいはアピアランスでデザインを作る。パスとアピアランスの両方を使えることが、Illustratorの真骨頂ではないかと思う。</p>
<p>ドロップシャドウをつけるときは、パラメータに注意しよう。少し気にかけて慎重にパラメータを設定するだけで、デザインが段違いに綺麗になる。なるべく、デフォルトの設定を使わないこと。そうしたコツのようなものは、自分は作業所の他の人に教えてもらったり、データを見たりして分かった。他人のやり方を学ぶことが、Illustratorのほとんどだ。</p>

<h2>紙の質感（テクスチャ）を再現する</h2>
<p>紙の質感を再現したテクスチャは、「ちりめんじわ」効果と「クラッキング」効果と「ぼかし（ガウス）」効果をかけたオブジェクトに、色のついたオブジェクトを不透明度をオーバーレイにして重ねることで再現できます。</p>
<p>また、文字を紙のようなざらざらした文字にするためには、「ラフ」効果とテクスチャをカンバスにした「テクスチャライザー」効果をかけて、不透明度の設定を焼き込みカラーにすることで実現出来ます。</p>
<p>以上のことをする際に、注意すべき点は効果のパラメータです。実際のデザインを見ながらパラメータを変えましょう。Illustratorの肝と言えるのが効果のパラメータです。</p>
<p>紙の質感以外にも、アルミだったり球体だったり、Illustratorで重要な分野となるのが、質感の再現です。時に、グラデーションを「少し位置と角度を変えて階層的に」行ったり、グラデーションメッシュを使ったりします。基本的には「効果」からIllustratorやPhotoshopの効果を使います。複数の効果を重ねて使うことも多いです。</p>
<p>詳しいことは、以下のサイトの説明を参照してください。自分も以下のサイトの通りやりながら、パラメータを少し違ったものに変えたりして行いました。</p>
<ul>
<li><a href="http://web.k-daiichi.com/news_contants/news_page40.html">ザラザラした紙のテクスチャ｜さいたま・川口のホームページ制作は関東ダイイチ</a></li>
<li><a href="https://www.rhkplus.net/single-post/2017/09/01/%E3%80%90Illustrator%E3%80%91%E3%82%A4%E3%83%A9%E3%83%AC%E5%8A%B9%E6%9E%9C%E3%81%A7%E3%80%8C%E7%B4%99%E3%81%AE%E3%83%86%E3%82%AF%E3%82%B9%E3%83%81%E3%83%A3%E9%A2%A8%E6%96%87%E5%AD%97%E3%80%8D%E3%82%92%E4%BD%9C%E3%82%8B%EF%BC%81">【Illustrator】イラレ効果で「紙のテクスチャ風文字」を作る！ | 株式会社RHKplus</a></li>
</ul>

<h2>良く使う効果</h2>
<p>良く使う効果は、まず、</p>
<p>・ドロップシャドウ - とても多用する。</p>
<p>・光彩 - たまに使う。</p>
<p>・ぼかし - フォントを綺麗にしたりするときに使うことが多いが、パターンなどの背景について使うこともある。</p>
<p>・角を丸くする - 白縁やシャドウのある写真の枠を綺麗に丸くするのに使う。</p>
<p>などが基本で、あとは綺麗に変形するための、</p>
<p>・ラフ - 四角形の飾り付けに良く使う。</p>
<p>・ジグザグ - 四角形の飾り付けに良く使う。</p>
<p>・自由変形 - タイトルロゴの作成などに使う。</p>
<p>それから、ワープの</p>
<p>・アーチ - キャプションのテキストに使う。</p>
<p>・円弧 - アーチと同様。吹き出しを作るために使うこともある。</p>
<p>・旗 - のれんや川のような表現に使う。</p>
<p>ぐらいではないかと思います。</p>
<p>ほかにも、3Dのべベルとか、テクスチャに使うPhotoshop効果なども使います。</p>

<h1>グラデーションと透明</h1>

<h2>パターンやグラデーション、透明度など</h2>
<p>塗りを単色ではなく、パターンやグラデーションにすることも出来ます。透明度を設定することで、品のあるデザインに出来ます。</p>
<p>パターンを作ることで、簡単に見栄えの良いデザインを作ることが出来ます。</p>
<p>パターンを編集するために、パターン編集モードを上手く活用しましょう。</p>
<p>グラデーションは、グラデーションツールを使うことで、円形のグラデーションの位置などを動かすことができます。これによって、美しい金属や水の球体を表現できます。</p>

<h2>不透明マスク</h2>
<p>透明ツールからマスクを設定することで、部分的に画像を透明に出来ます。グラデーションなどをかけることで、段階的に消えていくようなマスクをかけることが出来ます。マスクは、白い部分で画像が見え、黒い部分で画像が消えるようになります。</p>
<p>不自然な写真やイラストの切れ端があった場合に、自然にぼかして消えていくような処理をかけることが出来ます。</p>
<ul>
<li><a href="http://media.imejin.biz/illustrator/opacity-mask">イラレの不透明マスクを使って、写真に透明なグラデーションをかける！ - Designers' Tips</a></li>
</ul>

<h2>グラデーションでぼかした円を作る</h2>
<p>たとえば、白くぼかした円を透明度100%と白のグラデーションで作ることができます。他の方法として、ぼかし効果を使う方法や、光彩などを使う方法もありますが、グラデーションで行うと、調整がしやすいです。下に記述するグラデーションメッシュや不透明マスクを使う方法もあります。</p>
<p>イラレでオブジェクトを編集する際に、効果やアピアランスを多用する方法ももちろんありますが、複数の複製を前面にコピーして、透明度や白を上手く使って重ね合わせで色を表現することもできます。この時は、アピアランスを使ったり、マスクを使ったり、あるいは描画モードを使うことで、たとえば「写真をパスで切り抜いて、外側の部分だけ色を重ねる」などといった手法が使えます。</p>

<h2>グラデーションメッシュ</h2>
<p>グラデーションメッシュを使うと、写実的な絵画のような、美しい陰影と立体感があるグラデーションを作ることが出来ます。</p>
<p>イラレの中で最も複雑で難しい機能の1つだと思います。頑張ってマスターすれば、ネットにある素材のようなイラストカットを作るのに役に立ちます。</p>
<p>基本的には、グラデーションメッシュを作成して、メッシュラインとメッシュポイントを変更し、グラデーションの色を付けていきます。</p>
<p>メッシュポイントに色を設定することで、ポイントとポイントが互いに干渉し合う、印象的で立体的なグラデーションを作ることができます。メッシュラインを変えることで、へこみを表現できます。</p>
<p>グラデーションメッシュと不透明マスクを組み合わせて写真に使うことで、写真を徐々にぼかすような効果をつけることもできます。</p>
<p>波型の輪郭をした図形など、単純な図形であれば、グラデーションメッシュを使うことで、「パスにフィットしたグラデーション」をかけることができます。たとえば、クリスマスのデザインなどの場合、長方形のパスにジグザグで波型にしてアピアランスを分割し、その上でグラデーションメッシュを列数・行数ともに1にしてかけ、その上でメッシュポイントを選択して赤と白のグラデーションにしたりすることが考えられます。通常のグラデーションでは波型にフィットしたグラデーションはできませんが、グラデーションメッシュならばできます。その上でぼかしをかけたり、前面のオブジェクトとして英文フォントでクリスマスのタイトルを書くこともできます。元のオブジェクトから波線部分だけをコピーして、パス上文字にしても良いでしょう。</p>
<p>特に、扇形に開いた長方形のように、簡単にグラデーションをかけることが出来ない場合に、グラデーションメッシュを簡単に使って綺麗なグラデーションを作ることができます。扇形の長方形はワープで作り、アピアランスを分割しましょう。</p>

<h2>描画モード</h2>
<p>透明パネルから描画モードを選択することで、透明のかけ方を変えることができます。</p>
<p>たとえば、「乗算」にすることで、背景の色と前面のオブジェクトの色を掛け合わせて、一味違った透明のスタイルを行うことができます。</p>
<p>描画モードは、パターンやアピアランスと組み合わせて使うことで、綺麗な透明がかったパターンの背景などを作ることができます。（ただ、自分でも出来ていません。そうした技術力がほしいです。）</p>
<p>描画モードを知らない方は（僕を含む）、適当なパターンをスウォッチに登録し、アピアランスから塗りを追加して、塗りに適当なパターンを適用し、塗りを追加して、新しい塗りに色を設定し、新しい塗りをパターンの下に移動して、塗りの上にあるパターンに対して透明パネルから「描画モード」を変えてください。パターンの下にある塗りの色が、パターンを透過して「重なって」表示されるようになります。この状態で、描画モードを色々と変えて試してみましょう。</p>

<h2>グラデーションとブレンドによる光沢の表現</h2>
<p>ブレンドを上手に使うことで、立体感のある光沢を表現できます。</p>
<p>まず背景にベタのオブジェクトを配置し、その上に小さな水玉のようなパスを作成し、ブレンドを作成します。</p>
<p>小さく作ったパスの色と形から、全体のオブジェクトが綺麗な光沢のある背景になります。</p>
<p>また、文字に対してグラデーションをかけ、スライダーでそれを狭い範囲に調節することで、文字オブジェクトに対して光沢を表現できます。</p>

<h2>映りこみの表現</h2>
<p>映りこみの表現は、リフレクトしてコピーしたオブジェクトの上に、透明と白を設定したグラデーションをかけることなどで作ることができます。</p>
<p>この白と透明のグラデーションをスウォッチに登録した上で、オブジェクトをリフレクトコピーし、アピアランスから新しい塗りを長方形に変換して、長方形の色にこのスウォッチを適用するようにしても良いでしょう。</p>

<h1>オブジェクトの加工</h1>
<h2>パスの自由変形</h2>
<p>オブジェクトに影をつける時は、まず、オブジェクトを背面コピーし、パスファインダーから合体させます。この時、アピアランスの効果（たとえば角を丸くするなど）でオブジェクトを作っている場合は、上手く合体出来ないことがあります。その時は、合体させる前にアピアランスを分割でパスデータに変えます。そして、この背面コピーした影用のオブジェクトに、スウォッチで黒の塗りを設定します。このオブジェクトに、「パスの自由変形」効果をかけます。オブジェクトの輪郭が綺麗な影になるように、四角形を変形してください（プレビューは出来ません）。そして、影が出来たら、透明度を少し下げて、ぼかし効果をかけます。これによって、後ろに延びる影を表現できます。</p>
<p>シアーを使うやり方もあるかもしれませんが、パスの自由変形を覚えると、色んなことに応用できます。</p>
<p>アウトライン化したテキストにパスの自由変形をかけることで、文字を個別に、たとえば上部分だけを拡大したりできます。これによって、躍動感のあるロゴを作ることが出来ます。</p>
<p>また、ドロップシャドウを使う時のコツとして、普通にX軸とY軸にかけて右下に影をつけるのではなく、上方向に影をつけることで、たとえばお皿にのったお団子など、立体感を際立たせることができます。</p>

<h2>散布ブラシ</h2>
<p>散布ブラシは上手く使うことで、とても綺麗な線のデコレーションを表現することができます。</p>
<p>たとえば、文字のアウトラインを取って、その線に星の散布ブラシをパラメーターを上手く調節してつけてやることで、星の輪郭を彩ったタイトル文字を作ることが出来ます。

<h2>ブラシと線幅プロファイル</h2>
<p>Illustratorで、線を選択した時に、画面上部に出る「ブラシ」の機能の横に、「線幅プロファイル」という機能があります。</p>
<p>線幅プロファイルを設定することで、単純な直線や曲線でも、デザイン性の高い綺麗な線にすることができます。</p>
<p>たとえば、直線ツールで直線を引いた後で、「ジグザグ」効果をかけて波のような曲線にし、それに線幅プロファイルで凸凹のあるプロファイルを設定することで、ただの曲線でも、明らかに美しい曲線に変えることができます。</p>
<p>ブラシを使う時のコツは、「既にあるブラシを、もっと別のブラシに改良することを恐れない」ことです。ブラシをたくさん作って、たくさん改良しましょう。いつか、きちんと綺麗なブラシが作れます。オブジェクトの編集と同じように、ブラシを編集し、再登録し、何度も適用し直してください。</p>
<p>線幅プロファイルは、線幅ツールを使うことで、自分で独自の線幅を作ることもできます。</p>

<h1>写真</h1>
<h2>写真デザインの注意点</h2>
<p>写真を拡大・縮小する時は、縦横比が変わらないようにしましょう。Shiftキーを押しながら拡大・縮小することで、縦横比を維持したまま写真の大きさを変えられます。</p>
<p>写真に白縁を線でつけている場合は、環境設定の「線幅・効果も拡大・縮小する」にチェックが入っているかを確認しましょう。チェックが入っていると、線幅が変わってしまいます。</p>
<p>写真は、出来るだけ埋め込みではなくリンクで配置するようにしましょう。埋め込みにすると、ファイルサイズが大きくなります。写真を配置する前に、Photoshopで写真をepsデータにしてください。特に、写真の解像度を大きくし、印刷媒体の時はモードをCMYKにしましょう。写真のサイズ以上に写真を拡大すると、写真が荒くなります。出来るだけ、配置して使う時よりも大きなサイズの写真を使うようにしましょう。埋め込みとリンクの設定や写真の拡大比率などは、リンクパネルから確認することが出来ます。</p>
<p>写真を一部だけ拡大して同じ大きさにするなど、拡大と同時にトリミングをしたい場合は、クリッピングマスクを使いましょう。四角形で切り抜くだけではなく、角丸四角形や円で写真を切り抜くこともできます。回転と組み合わせることで、写真に動きを付けることが出来ます。ドロップシャドウを付ける時は、クリッピングマスクと同じ大きさの四角形を背面コピーで作り、それにシャドウをつけてグループ化してください。</p>
<p>写真に対して「ぼかし（ガウス）」効果をつけることで、実名や顔写真など、外部には見せたくないデータにぼかしをかけることが出来ます。写真だけではなく、文字の場合も同様です。</p>
<p>写真にクリッピングマスクをかけながら白縁とシャドウを付けたい時は、クリッピングのパスを背面コピーし、そのパスに白縁とシャドウをつけます（クリッピングマスク自体には白縁をつけることが出来ない。）インターネットで取ってきた素材などでは、クリッピングのせいで白縁が付けられない時があります。その時は、クリッピングになっている部分のパスを背面コピーすれば付けられます。また、クリッピングにこの方式で白縁とシャドウを付けている時に、全部の写真を小さくしたい時は、まずダイレクト選択ツール（白矢印）で全ての写真を選択してロックをかけ、その後にダイレクト選択ツールで写真の下のアンカーポイントをShiftを押しながら全ての写真について選択し、その上で「個別に変形」から、基準点を「真ん中上」にして拡大・縮小します。基準点を設定することで、上の位置を変えずに下の境界だけを小さくすることが出来ます。</p>

<h2>画像トレース（ライブトレース）</h2>
<p>プロが良く使う機能のひとつが、画像トレース（ライブトレース）である。JPGやPNGなどの写真データを、Illustratorのパスにトレースすることができる。作ったパスは、変形できるほか、効果によってたとえば油絵のようにしたり、色鉛筆で描いたような画像にしたりすることができる。</p>
<p>僕は画像トレースをあまり使いこなせていないが、僕の周りにいるみんなは良く使っている。タイトルや背景を作ったりする時に効果的に使うと綺麗なイラストチックなデザインができるだろう。</p>

<h1>機能の拡張</h1>
<h2>スクリプト</h2>
<p>Illustratorでは、足りない機能を拡張するためにスクリプトを使うことができる。また、単純な処理を自動化するために、自分で.jsや.jsxファイルをJavaScriptなどの言語で書くことで、スクリプトを自由に作ることができる。</p>
<p>Illustrator自体はAdobeのソフトであり、オープンソースではないが、機能の拡張はオープンに行うことができる。ある意味、GIMPなどでも同様のことはできる。Illustrator自体がオープンソースにはならないだろうが、ネットのある今の時代、インターネットから無料でさまざまなスクリプトをダウンロードすることができる。</p>

<li><a href="https://liginc.co.jp/249449">Illustratorでスクリプトを使って面倒な作業を自動化する方法 | 東京上野のWeb制作会社LIG</a></li>

</ul>

<h1>応用とデザイナーへの道</h1>
<h2>効果やレイアウトを一通り分かったら、いよいよアートワークを</h2>
<p>僕の欠点として、効果やレイアウトなどの基本的な機能は分かっているし、さまざまな機能を使いこなしたりはしているものの、「肝心のオブジェクトの配置と加工が出来ていない」ということが言える。</p>
<p>色んな賢い機能を使っていても、それはただのデコレーションや装飾にすぎない。</p>
<p>きちんとイラレを使うためには、むしろ、もっと単純な機能を上手く使っていかなければならない。四角形ツールや楕円形ツールを使ったり、ペンツールなどを使いながら、アートワークを作っていかなければならない。</p>
<p>だから、これくらいを全て分かったら、「一度初心に戻ってアートワークを配置・加工する」ということをやってほしい。それで、れっきとしたデザイナーの仲間入りである。</p>

<h2>スウォッチライブラリは使える</h2>
<p>どうでも良い情報かもしれませんが、スウォッチライブラリは地味に使えます。たとえば、バロックやルネサンス風の色使いをライブラリから使って、あとはグラデーションや効果、線と塗りだけを使った単純なデザインでも、スウォッチライブラリのおかげでとても綺麗なデザインにすることができます。</p>

<h2>Photoshop効果</h2>
<p>僕が今でも分かっていないものとして、Photoshop効果がある。特に、白黒の濃淡あるテクスチャを、どんな時に使えば良いのか分かっていない。</p>
<p>だが、今日（2018.10.19）教えてもらったこととして、カラーハーフトーンがある。これはアメリカンコミックにあるようなドット（点）による諧調や陰の表現ができるもので、白黒のグラデーションにかけると階調に応じてドットの大きさが変わり、ユニークなドットのテクスチャを作ることができる。カラーのアートワークに使うと、色がバラバラになったような表現になる。これを不透明マスクと一緒に使うことで、写真や文字などを、とってもセンスの良いドットのスタイルにすることができる。</p>
<p>僕は、まだまだ、Illustratorを素の機能の集合としてしか使っていない。もっと応用的な技をどんどん知りたい。たとえば、月の描き方は円を二つ描いてパスファインダーで分割するが、そういうノウハウはネットにいくらでも入門やチュートリアルがある。ネットは怖いが、本当は良い人間ばかり多いから、Facebookなんかをやるよりも、Illustratorの勉強をネットを使って頑張りたいと思っている。</p>
<p>ある意味、イラレ使いが最後に行き着くのは、Photoshop効果です。上手く使うことで、ロゴに雪を降らせたりなど、さまざまな効果をかけて組み合わせることができます。</p>

<h1>絵とイラストの制作</h1>
<h2>絵が描けないとお悩みのあなたに、最強の「画像トレース」を</h2>
<p>絵が綺麗に描けないとか、自信がないとか、描いても綺麗な絵にならなくて悩んでいるとか、お悩みの方にお勧めなのが、最強のツール「画像トレース」です。</p>
<p>画像トレースは、写真や画像の輪郭線をイラレが自動的に認識して、綺麗なパスデータにしてくれます。</p>
<p>写真だけではなく、たとえばキャラクターのイラストのようなものも画像トレースにかけることができます。たとえば、ミニオンズのキャラクターをパスデータにすることが考えられます。</p>

<h2>イラレで絵を描く時の二つの王道：ペンツールと図形ツール＋効果</h2>
<p>イラレで絵やイラストを描く時には、二つの王道があります。それは、ペンツールでベジェ曲線をひとつひとつ描いていく方法と、図形ツールと効果でイラストを作る方法です。</p>
<p>ペンツールを使うのは、もともとはJPGのようなビットマップの画像があって、その上からトレースを行ったり、あるいは自分で現実のラフイラストを描いて、それをスキャナーでスキャンしたりする場合です。</p>
<p>この場合、イラレでフリーハンドでイラストを描いていくのは、プロでも難しい作業です。鉛筆と消しゴムを使ってローカルにイラストを描き、それを取り込んでトレースすると良いでしょう。下絵はネットを検索してGoogleイメージ検索などから参照すると良いでしょう。</p>
<p>また、簡単な四角形をラフに描きたい場合などは、ペンツールは有用ですし、波を綺麗に表現したり、文字を流し込むための基本となるパスを描いたりすることもできます。</p>
<p>もうひとつのやり方は、上の方でも書きましたが、図形ツールと効果を使っていくやり方です。たとえば、動物の顔のようなイラストは、楕円形ツールや四角形ツールを使いながら、パスファインダーで複数の図形を合成したりアンカーポイントやセグメントやハンドルを加工したりすることで、イラストチックな絵が描けます。これは慣れないと難しいですが、イラレで絵を描いているイラストレーターの人たちはこの方法でイラストを描いています。</p>
<p>この場合、たくさんのイラレの効果やフォトショの効果を使うことで、綺麗な仕事を行うことができます。イラレの効果には、パスそのものの変形を行うものが多く、ラフやジグザグがその典型例です。また、ワープ効果を使うことで、なだらかなパスの変形を行うこともできます。フォトショの効果は、よりグラフィックス的な側面が多く、文字に対して雪のかすれた表現を行ったりなどする時に使います。</p>

<h2>絵の練習はペイントツールや塗り絵で</h2>
<p>絵の練習を行いたい人は、イラレでパスを頑張って引くよりも、ペイント系のツールを使いましょう。僕は、ペイントツールSAIというペイントソフトウェアと、ペンタブレット（マウスの代わりにパソコンと繋がった電子ペンでイラストが描ける）を使いながら、幼児向けの塗り絵の輪郭を引いたり、カラーピッカーを使いながら色を塗ったりして、作業所で仕事の合間にイラストの練習をしています。</p>
<p>塗り絵は以下のサイトなどからダウンロードできます。PDFなのでPhotoshopなどを使ってJPGに変換しましょう。</p>
<ul>
<li><a href="https://happylilac.net/nurie4.html">ぬりえ　【動物・生き物のぬりえ-１】｜幼児教材・知育プリント｜ちびむすドリル【幼児の学習素材館】</a></li>
</ul>
<p>また、現実世界でキャンバスに対して絵を描いていくのももちろん有用です。ですが、これは手間と時間がかかる割に、続けることが難しいでしょう。もっと手軽にやりたい方は、「トレーシングペーパー」という透ける紙を使って、たとえばモーツアルトの肖像画のようなものを上から鉛筆でなぞっても良いでしょう。これはイラストを制作する、というよりは、西洋絵画の勉強になるでしょう。模写に使う絵は昔から定番になっているレオナルド・ダ・ヴィンチの作品から、「最後の晩餐」などで練習しても良いでしょう。ただ、自分が楽しい、続けられる、と思える方法が一番です。最初のうちはなぞるだけで構いません。何も考えず、ただなぞりましょう。</p>
<p>本当は、絵の練習というのは、技術ではありません。たくさんの絵の輪郭線の書き方を知っている、という意味での、ボキャブラリーや知識なのです。よって、たとえば、くまの輪郭線の描き方を知ればくまが描けるようになるし、ペンギンならペンギン、ヤギならヤギが描けるようになります。新しい絵を描くならば、特徴を良くつかむことです。それだけで、きちんと絵が描けます。絵とは一種の知識なのです。</p>

<h1>素材の効果的な使い方</h1>
<h2>素材は複数コピーしたり、加工して風景にしたりする</h2>
<p>素材を使う時に初心者（僕も含む）がやることとして、素材をただポツンとひとつ配置するだけ、ということがあるが、上手いやり方としては、たとえば素材を複数コピーして、一部を小さくして色を変えたり（たとえば赤いもみじの隣に黄色い小さなもみじを配置する）、あるいは風景や景色のように配置してタイトルらしくする、などといったやり方がある。</p>
<p>人間であれば、ものを持たせたりすることもできる。</p>
<p>シャドウや白縁を付ける時は、シャドウや白縁が重ならないように、複数のオブジェクトをグループにした上でシャドウや白縁を付けよう。</p>
<p>回転や拡大縮小だけを使うのではなく、さまざまなやり方が考えられる。透明やクリッピングマスクをかけるのもそうだし、効果でワープのようにすることもできる。</p>
<p>素材のコピーはとても良く使う方法で、シンボルに登録してシンボルスプレーのようなシンボル系のツールを使ったり、あるいはパターンやブラシを作ることもできる。だが、基本はたくさん配置して、見栄えを整えること。それだけで綺麗なデザインを簡単に作れる。透明度を変えたり、ライブカラーで配色を変更したりすることもできる。たとえば、桜の花びらをそのままの形で金箔に変えても良いだろう。この時は、桜の花びらの素材の上から四角形ツールで金箔を作る。ロックなどの機能を上手く使おう。ライブカラーには、スウォッチライブラリのカラーだけを選べる機能もある。金箔にするのであれば、「金属」のスウォッチライブラリに、金や銀のスウォッチがあるので、参照してほしい。</p>

<h1>デザインの手法</h1>
<h2>レイアウトはコピーとガイドを上手く使いこなそう</h2>
<p>Illustratorを使う上で、「きちんと分かっているデザイナー」として使えるテクニックは、基本的なものですが、「コピー」と「ガイド」です。</p>
<p>コピーは、たとえば変形効果にはコピー数を指定することができます。これで、ブラシと同じようなことができます。</p>
<p>それから、写真をクリッピングマスクで切り抜いて、元の写真の上に切り抜いた同じ写真をコピーし、その上で後ろの画像に描画モード「乗算」で色をつける、などが考えられます。</p>
<p>綺麗なレイアウトデザインをしたい時に、使えるのは「ガイド」です。四角形からオフセットを取る方法や、定規からドラックしてガイドを引く方法があります。配置を行う前に、要素が何であるかを明確にして、どのようなレイアウトで配置したいかを考え、その上でガイドを引いてオブジェクトをレイアウトに配置しましょう。</p>
<p>そして、コピーとガイドを上手く使った上で、回転や拡大縮小をしたり、フォントを変えたり、色をつけたりします。</p>
<p>基本的には、レイアウトデザインをそのように行って、文字に装飾をつけたり、加工したりするのは、その上で考えます。横組みを縦組みにしたり、絵と文字を上手く適合させたりしながら、「視覚的に分かりやすく、注目をあび、同時に内容を正しく伝えられるようにする」、それがレイアウトの基本です。</p>

<h2>「どうすれば綺麗になるか」というビジョン</h2>
<p>デザインをやる時に、レイアウトと装飾だけで作ることはできますし、デザインの本に書かれているように、レイアウトを優先順位や伝えたいものに従って作ることもできます。</p>
<p>ですが、芸術として考えた時に、デザインとは「どうすれば綺麗になるか」というものを明確に分かっている状態で行う、「ビジョン」であると思います。</p>
<p>たとえば、名前部分を装飾する時には、ひし形や丸で縁取ることも考えられますし、それをグラデーションやぼかしにしても良いでしょう。テキスト領域には、背景となる四角形の装飾を付けて、シャドウやグラデーションをかけても良いでしょう。</p>
<p>デザインはビジョンです。デザインを考える時に、さまざまなインターネットのサービスを使うことができます。便利なのはグーグル検索やPinterestです。さまざまなデザインを簡単に見つけることができます。</p>
<ul>
<li><a href="https://www.pinterest.jp/">Pinterest</a> - 利用には登録が必要だが、関連するイメージを簡単に見つけたり、ピンをとめたりする機能があり、良いデザインの例を探す時に使いやすい。</p>
</ul>

<h2>Illustrator効果はパスの変形、Photoshop効果はテクスチャ</h2>
<p>Illustratorには、2つの効果があります。それは、Illustrator効果とPhotoshop効果です。</p>
<p>Illustrator効果は、Illustratorで作ったベジェ曲線のパスに対して、「パスの形状の変形」の効果を行います。シャドウ（影）をつけたり、ぼかしたり（ぼかしの一部はPhotoshop効果にもある）する効果も含まれます。</p>
<p>Photoshop効果は、オブジェクトの色やパターンに対して、「テクスチャ」を作り出します。たとえば、ステンドグラスとか、粒状とか、こする、などの効果があります。上手く使うことで、たとえば文字オブジェクトに対して雪を降らすような応用を行えます。</p>

<h1>良いデザインを作るために</h1>
<h2>効果</h2>
<p>Illustratorなどで良いデザインを使うために、一つの要素は「効果を使うこと」です。</p>
<p>特に、ドロップシャドウ、光彩、ぼかしを使うことが多いです。</p>
<p>その名の通り、効果的に使うことで、とても綺麗なデザインになります。</p>

<h2>色使い</h2>
<p>もう一つの要素は、色使いです。色を綺麗にまとめることで、一体感のある完成されたデザインになります。</p>

<h2>文字の縁と飾りフォント</h2>
<p>文字に縁を付けるためには、線と塗りを設定して重ね順を変えます。</p>
<p>飾り文字を作る時のフォントは、平成丸ゴシックのような可愛らしいフォントにしましょう。</p>

<h2>素材を効果的に使う</h2>
<p>素材は効果的に使いましょう。色を変えたり、カレンダーのような場合は一つの素材をたくさん配置しても良いでしょう。</p>
<p>素材は、組み合わせて加工して使うと良いデザインになります。たとえば、富士山の中に謹賀新年を入れたり、カレンダーの枠の色を日曜日と土曜日と平日で変えたりすることが考えられます。</p>

<p>素材は、素材サイトからダウンロードして使うことになりますが、ただ使うだけではなく、aiデータがある時はその内部の作り方を良く見て確認しましょう。</p>
<p>パスの引き方や色の付け方を学ぶことで、自分でも素材が作れるようになります。僕はまだそこまでの実力はありませんが、頑張ります。</p>

<p>素材は使う対象だけではなく、学習の対象にもなります。</p>

<h2>写真をトレースしてイラストを作る</h2>

<p>また、既にあるイラストを自分で真似して描きたい場合は、ノートのような紙に写真やイラストを見ながら真似した絵を描いて、それをスキャナーでスキャンし、そこからトレースする、という方法を使います。</p>

<p>Adobeによる、リッチインターネットアプリケーションのライブラリ。Apache Flexという名前でも知られる。</p>
<ul>
<li><a href="https://qiita.com/lune1122/items/b58b7580666b74e4c19d">Apache FlexでHelloWorldアプリを作り、配布できるようにパッケージングするところまで（AIR for Desktop）</a></li>
</ul>
<h2>Adobe Dreamweaver</h2>
<p>AdobeによるWebデザインソフトウェア。</p>

<h2>Macromedia</h2>
<p>Adobeとの競合関係にあったマルチメディア系ソフトウェア会社だが、何とAdobeに買収された。FlashやDreamweaverは昔はMacromedia社のものだった。</p>

<h1>ペイント系の会社・製品</h1>
<h2>Adobe</h2>
<p>AdobeはPhotoshopやIllustator以外にもたくさんの製品を出していて、利用料を払うことで一部あるいは全てのアプリケーションを利用出来ます。</p>
<p>昔はCS6などのバージョンを出していましたが、今はバージョンではなく最新版のCC（クラウド版）を利用期間単位の「利用料」として払います。</p>
<p>契約すると、ソフトウェアが使えるだけではなく、フォントをインストールしたりすることも出来ます。</p>
<p>AdobeのCCは利用料が高い。PhotoshopやIllustratorをどちらも使えるコンプリートプランにすると、一か月4,980円もする。僕は作業所だけの利用で利用料を払っている。</p>

<h2>Corel</h2>
<p>CorelDRAWなどを出している会社。昔、僕はCorelのPainterと言うリアルなタッチが得意のペイントを子供の頃に使って遊んでいました。</p>

<h2>CLIP STUDIO PAINT</h2>
<p>最近広告などを色んなところで出している、流行りのペイントソフトウェア。</p>

<h2>ペイントツールSAI</h2>
<p>ペイントツール。</p>

<h2>GIMP & Inkscape</h2>
<p>オープンソースで開発されているペイント・ドローアプリケーションとしては、GIMPとInkscapeが有名。</p>
<p>使ってみると、基本的なグラフィック機能は備えているが、応用的なツール性や機能性と言った点では、僕の普段使っているIllustrator CCにはまだ及ばないと言う感じだ。</p>
<p>ただ、無料で使える、誰もが自由にコピー出来る、ソースも見れる、と言う点では素晴らしいので、頑張ってほしい。</p>

<h2>MyPaint</h2>
<p>写真加工専門のGIMPに比べて、ペイントに特化したペイントソフトウェア。</p>

<h2>Paint.NET</h2>
<p>Windowsのペイントを拡張したようなペイントソフトウェア。</p>

<h2>PictBear</h2>
<p>タブブラウザのSleipnirの作者が開発していることで有名なペイントソフトウェア。</p>
