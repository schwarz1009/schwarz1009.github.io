<h1>ALGOL</h1>
<h2>ALGOL</h2>
<p>現在の多くの言語が「ALGOL系」と呼ばれるほど、成功した言語。30年以上、アルゴリズム記述のデファクトスタンダードとして使われた。</p>

<h2>ネスト可能なブロック</h2>
<p>「begin と end で囲む」というブロック構造を導入し、制御構造を自在にネストできる。</p>
