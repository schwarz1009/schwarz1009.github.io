<h1>Abema</h1>
<h2>Abemaとは</h2>
<p>Abemaは、日本のネット動画配信サービス。</p>
<p>さまざまな番組がテレビと同じように配信されている。</p>

<h2>藤井聡太の対局が面白い</h2>
<p>Abemaは藤井聡太をはじめ将棋棋士の対局を配信しているが、これが面白い。</p>
<p>テレビなので当然だがリアルタイムで視聴することができる。</p>
<p>僕は棋聖戦の最後の一局はAbemaで視聴し、藤井聡太が初タイトルを得るところを生で見ることができた。</p>
<p>Abemaでは将棋棋士の対局において、AIを使った今の勢力分析やAIが考えた最善手の一覧を見ることもできる。</p>
