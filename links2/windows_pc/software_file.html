<h1>ファイル管理</h1>

<h2>ファイラー</h2>
<h3>Windows Explorer</h3>
<p>Windowsの標準ファイルマネージャ。僕はExplorerで満足はしている。</p>

<h2>アーカイバ</h2>
<h3>7-zip</h3>
<p>圧縮解凍ソフト。僕はファイルのバックアップとアーカイブの作成には7-zipを使っている。</p>
<h3>WinRAR</h3>
<p>圧縮解凍ソフト。</p>
<h2>バックアップ</h2>
<h3>RealSync</h3>
<p>バックアップソフト。僕はバックアップの同期にRealSyncを使っている。</p>
