<h1>サーバーの基本設定</h1>
<blockquote class="inyou1">

<h1>サーバー管理</h1>
<blockquote class="inyou1">

<p>実際にPHPプログラムを書いていきます。</p>

default-character-set=utf8
</pre>

<h2>PHPとMySQLを連携させる</h2>

<h1>データベースの設計</h1>
<blockquote class="inyou1">
<h2>データベースの名前と照合順序</h2>
<p>phpMyAdminを使ってMySQLデータベースを作成します。データベースの名前には分かりやすい「db1」のような名前を付けましょう。</p>
<p>照合順序は、大文字と小文字を区別するか、検索結果であいうえおの後にアイウエオを表示するか、といった並び順を決めることで、標準的な「utf8_general_ci」を設定しておきます。</p>
<p>この大きな箱に、小さな箱である「テーブル」を作っていきます。</p>

<h2>テーブルの設計</h2>
<p>テーブルには、どんな項目が必要か、決めていきます。最初の設計が肝心です。</p>
<p>テーブルは、「カラム」と呼ばれる「列」と、「レコード」と呼ばれる「行」から構成されています。</p>

<h2>利用するユーザーを分ける</h2>
<p>初期設定でrootユーザーになっていると、削除や破壊が出来てしまって危険なため、ユーザーを分けましょう。</p>
<p>権限は、</p>
<p>１．データベースに対する権限</p>
<p>２．データベースの中の特定のテーブルに対する権限</p>
<p>３．テーブルの中の特定のカラムに対する権限</p>
<p>があります。</p>

<h2>SQL文</h2>
<p>以下はSQL文の例。</p>
<h3>SELECT</h3>
<p>SELECT（取り出し）：</p>
<pre class="prettyprint lang-sql">
SELECT recipe_name FROM recipes;
SELECT recipe_name,budget FROM recipes;
SELECT * FROM recipes;
</pre>
<h3>INSERT INTO</h3>
<p>INSERT INTO（挿入）：</p>
<pre class="prettyprint lang-sql">
INSERT INTO recipes (recipe_name,budget,howto) VALUES ('野菜炒め',800,'野菜を炒める');
</pre>
<h3>UPDATE</h3>
<p>UPDATE（更新）：</p>
<pre class="prettyprint lang-sql">
UPDATE recipes SET budget = 90, howto = '卵を焼く' WHERE id = 2;
</pre>
<h3>DELETE</h3>
<p>DELETE（削除）：</p>
<pre class="prettyprint lang-sql">
DELETE FROM recipes WHERE id = 1;
</pre>
