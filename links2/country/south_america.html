</div><h1>南アメリカの世界観</h1>
<p>南アメリカの世界観です。</p>
<p><a href="../natural/biology_south_america.html">南アメリカの生態系の世界観</a>に移動しました。</p>
<!--
<p>参考文献：「南アメリカ - Life Nature Library（ライフ／ネーチュア ライブラリー）」</p>
<div id="toc"></div>
<div class="page_links">

<h1>南アメリカの生物</h1>
<h2>概要：隔離された世界</h2>
<p>この大陸は、200万年前と300万年前のあいだのある時期に陸橋によって北の大陸とつながるまでは、世界のどの大陸とも隔絶した島大陸だった。そのためこの大陸の生物は、北から侵入者がやってくるまでは、それらとまったく無関係に進化をつづけてきた。そして現在生息している生物には、古い型と新しい型の生物が奇妙に入り混じり、有望な研究テーマに満ちている。</p>

<h1>サル</h1>
<h2>ホエザル</h2>
<p>名前の通り「吠えるサル」。南アメリカのサルは原住民に肉用・食用として重宝されており、しばしば射殺されるため、生き残ったものは極端に臆病になっている。このような状態の数少ない例外はパナマのバロ・コロラド島であり、バロ・コロラド島で最も目立つサルはホエザルである。</p>
<p>この島のサルたちははっきりとした群れ、すなわちクランに分かれており、それぞれの生息地は島の森林内の一定の地域に限られている。</p>
<p>このような生態系は互いに重なり合っていて、たまたま2つのクランが接近すると騒がしいほえ合いが始まり、一方のクランが退却するまで続く。</p>
<p>ホエザルは、動物界で最も騒々しいものの1つである。</p>

<h2>オマキザル</h2>
<p>オマキザルはじょうぶな動物で、アメリカのサル類の中では最も飼いやすく、たいていの動物園で見られる。オマキザルを観察していると、非常に“利口な”動物であることが分かる。そのため、この習性の精密な研究が行われるようになった。このサルと肩を並べられるのは、アフリカのチンパンジーだけである。</p>
<p>オマキザルは、道具を使って物事を処理するのが特に上手い。</p>

<h2>クモザル</h2>
<p>熱帯アメリカの森林の曲芸師、すなわちクモザル類は、最高度に発達した巻き付く尾を持っている。ブランコ乗りとしての唯一の競争者は熱帯アジア産のテナガザル類で、これは尾を持っていないが、みごとなブランコ曲芸をする。まさに第5の手といえるクモザルの尾は、信じられないほど長い腕よりもさらに長く、木登りだけでなく物をとるときにもしばしば使う。</p>

<h1>古くからの居住者</h1>
<h2>オポッサム</h2>
<p>南アメリカが隔離されていたあいだに栄えた初期の有袋類は、その大多数が来たから侵入した有胎盤類との競争に屈服したが、ただ1科、オポッサム類だけは今なお繁栄している。このなかで最もよく知られているのは、粘り強く適応性も高いふつうのオポッサムで、彼らは滅びるどころか、北アメリカにまで進出していった。</p>

<h2>ナマケモノ</h2>
<p>カメの研究で有名なアーチ―・カーは、コスタリカで5日間ナマケモノを観察し、次のように述べている。</p>
<p>「この動物の信じがたいほどののろさ、奇妙さは、外観からはまったく察知できない。私は、“のろさ”ということばを、非難されるべき愚鈍さというのちに加わった言外の意味ではなく、動作がのろいという本来の意味に用いているのである。この動物ののろさは、まさに自然界の驚異の1つである。それはもはや動物の運動といったものではなく、神経が破壊されて、もはや収縮性の原形質が役に立たなくなったような、不気味な機械的なのろさである。アメーバの細胞質であれ、飢えたボアから逃げようとするナマケモノより速く流動する。このように、何をするにも鈍くて、がまんできないほどのろい上に、ナマケモノは何をするにもためらって、ぐずぐずするのである。」</p>

<h2>アリクイ</h2>
<p>オーストラリアのハリモグラやアフリカのセンザンコウのようにアリを食べる哺乳類は世界の他の地域にもいるが、ここに示した南アメリカの3属（コアリクイ、オオカリクイ、ヒメアリクイ）だけが“本当の”アリ食いだと思われる。さらに、彼らはまったく歯を持っていないのだから、唯一の“本当の”貧歯類である。</p>

<h2>アルマジロ</h2>
<p>貧歯目もう1つの科はアルマジロ類で、甲を持つ唯一の現生の哺乳類である点で特殊である。甲は大きな鱗が結合してできた骨質の節、すなわち“帯”でできており、この帯に応じてそれぞれの種にミツオビ、ココノオビなどの名前がつけられている。</p>

<h1>北からの侵入者</h1>
<h2>マーゲイ</h2>
<p>200万～300万年前に南北アメリカが地峡で繋がった時、両大陸の動物は互いに入り混じった。いくつかの種類は北へ移動したが、南に移動した種類のほうがいっそう多かった。たとえば、食肉類やラクダ科のあるものなどが南進した。食肉類ではマーゲイもその1つだが、多くの種類がいまもなお生存している。ラクダ科では、グアナコとビクーニャが残っている。</p>

<h2>ジャンガルディ</h2>
<p>カワウソネコとも言われる。カワウソのように泳ぐわけではなく、大きさも、長くて低い体系も似ているためである。</p>

<h2>ジャガー</h2>
<p>新世界のネコ類の中で最も大型。</p>

<h2>タテガミオオカミ</h2>
<p>首のまわりに暗色のえりのような毛があるためこの名がある。</p>

<h2>コウモリ</h2>
<p>第三紀に南アメリカに到達して広く放散し、ついに他のどこにもない6つの科を作り出した。このうちヘラコウモリ科が最大で、最も変化に富んでいる。</p>

<h2>グアナコ</h2>
<p>野生種で、ラクダの仲間。パンパスに小さな群れを作ってすんでいる。ラマとアルパカは、グアナコからつくりだされたもの。</p>

<h2>ビクーニャ</h2>
<p>これも野生種で、グアナコより小さく、アンデスの雪線のすぐ下にすんでいる。</p>

<h2>ラマ</h2>
<p>グアナコの蓄養種。インカ帝国を作ったインカ族より前の種族によって、大きさと強さに改良が加えられ、荷物運搬に使われるようになった。</p>

<h2>アルパカ</h2>
<p>グアナコのもう一つの蓄養種で、長くて柔らかい毛をとるため飼育された。</p>

<h1>鳥</h1>
<h2>南アメリカの鳥</h2>
<p>南アメリカの鳥類相は、どの大陸よりもきわめて特異で、種類の豊富さでは世界一である。</p>
<p>ティエラ・デル・フエゴの先端からメキシコ中央部にかけては、現在知られている鳥類全体の約5分の2が生息する。</p>

<h1>爬虫類と両生類</h1>
<h2>爬虫類と両生類</h2>
<p>多くの人は“熱帯”と聞くと、深くよどんだ川にひそむ不気味なヘビ、トカゲ、カエル、ワニなどの姿を思い浮かべるに違いない。事実、われわれが無意識のうちに、熱帯の暖かく湿度の高い土地を爬虫類や両生類に結び付けて考えるが、それにはそれなりの理由がある。熱帯地方には他のどんな地域よりも多数の爬虫類や両生類が住んでいることと、どちらも冷血動物であるという解剖学的差異によるものであろう。</p>

<h2>ヘビ</h2>
<p>ボア類、アナコンダ類、およびその仲間の小型種は、アメリカ原産のヘビ類で、アナコンダ類には世界最大のヘビが含まれ、これに匹敵する大きさのものは東洋区のニシキヘビ類だけである。</p>
<p>熱帯アメリカで最も危険なヘビは、すべてクサリヘビ科のもので、マムシ亜科に属している。このマムシ亜科には、北アメリカのガラガラヘビ、モカシン、カパーヘッドなどのほか、ユーラシアと熱帯アメリカの多くの種類が含まれる。熱帯アメリカにはアメリカハブ属のヘビが20数種いる。</p>

<h2>カメ</h2>
<p>ヘビ類は印象的な動物であるが、カメ類はあまりそういう見方をされていない。しかし南アメリカのカメ類は、動物学者にはきわめて興味深い特徴を持っている。たとえば、ヘビクビガメ科は、南アメリカとオーストラリアおよびニューギニアにだけ産するし、別のヨコクビガメ科は、南アメリカとアフリカおよびマダガスカルにだけ産するのである。</p>

<h2>ワニ</h2>
<p>カメの敵としては、人間の他に、クロコダイル類とカイマン類がいる。南アメリカには、クロコダイル類は2種しかいない。すなわち、その名の河川系にだけすむオリノコワニと、フロリダの南端から南アメリカの北部にかけて広く分布するアメリカワニである。カイマン類には7種あって、3属に分類される。これは新熱帯区の特産で、ミシシッピーワニに似ており、構造もわずかに異なるだけである。アメリカ合衆国の鳥獣店で売られているいわゆる「アリゲーター」は、ほとんどこのカイマンである。これは、本当のアリゲーターつまりミシシッピーワニが、アメリカでは法律で厳重に保護されていて、生きたままのものを入手することは非常に困難なためである。</p>
<p>新世界のワニの中で最も大きいのはオリノコワニである。</p>

<h1>昆虫</h1>
<h2>昆虫</h2>
<p>世界で最も変化に富んだ昆虫群は、ほとんど熱帯地域に生息している。昆虫はとても種類が多く、学名がついているものでも80万種、世界全体で少なくとも400万種はいると思われる。これに比べると、哺乳類は世界全体でわずか4300種、鳥類は8600種、両生類と爬虫類は合わせて約8900種、そして淡水魚類が約5000種である。したがって、昆虫を調べ始めると、われわれはかつて出会ったことのないような種にたえずぶつかり、驚異と発見の魅力にとりつかれてしまう。昆虫の世界ほど、多彩の生命がひしめいているところはないといえよう。</p>

<h1>河川とその生物</h1>
<h2>南アメリカの河川</h2>
<p>3つの大きな河川系が南アメリカ大陸のほぼ全域を支配し、河川の動植物相に著しい影響を与えている。大陸の北部にはオリノコ川があって、最初は北に、ついで東に流れトリニダート付近で大西洋にそそぐ。もっと南には、この大陸の上半分のふくらんだ部分をほとんど2分する、あらゆる川の中で最も巨大なアマゾン川がある。ずっと南には、アマゾンの支流マデイラの1枝流とほとんど連なるパラナ・パラグアイ河川系がある。これは南に流れ、ブエノスアイレスで大西洋にそそぐ。</p>

<h2>魚</h2>
<p>南アメリカの川魚の大部分は、ナマズ科、カラシン科、シクリッド科の大きなグループに属している。このほか、この大陸には特殊な小さなグループがいくつかある。なかでも珍しいのは約40種からなるデンキウナギ科である。</p>
<p>魚の世界における各種目の第1人者を選ぶとすれば、南アメリカの魚もいくつか選ばれるに違いない。たとえば、純粋の淡水魚で最も大型のものとしてピラルクと巨大なナマズ、最も油断のならないものとしてカンディル、最もどう猛なものとしてピラニア、そして最も突飛なものとしてデンキウナギが加えられよう。長さが1.5～1.8メートルもある大きなデンキウナギなら、650ボルトもの電気を起こすことができるし、90センチのものでも350ボルトを出すことができる。この魚の電気で人間が死んだという確実な例はないが、あり得ないことではない。</p>
<p>南アメリカと中央アメリカの河川には、おもしろい、色彩に富んだ小魚が充満している。ソードテールの雄は跳躍の名手だし、チョコレートシクリッドは体色をバラ色に変えることができる。多くの魚は、原産地以外での繁殖はむずかしい。これは、捕らえられた場所が正確にわからないため、好意な環境を再現できないからである。しかし、たいていは、ブラインシュリンプやカの幼虫、殺したばかりのハエなどを餌にして水槽で飼育できる。藻類を食べるものは、ホウレンソウで十分であり、大きな魚が小さな魚を食べる自然のおきては、適当に満腹させることで防げる。</p>
