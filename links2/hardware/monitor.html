<h1>ディスプレイ</h1>
<p>出力をモニター画面に映し出す装置。</p>
<p><a href="../tech/tv.html">テレビ</a>も参照のこと。</p>

<h2>解像度</h2>
<p>ディスプレイの文字や画像は、点（ドット）が集まったもので、ドットのことを画素やピクセルとも言う。</p>
<p>解像度は640x480など。ドット数が大きいほど解像度が高く、きめ細かい自然な文字や画像を表現することができる。</p>
