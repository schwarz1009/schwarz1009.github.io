</div><h1>＝2013-11-27＝</h1>

<p>治すのは悪い。治すのを止めれば分かる。</p>
<p>僕は、自分の書いた文章が怖かった。内容も悪いが、書くのが辛い。</p>
<p>あとは、パソコンが怖かった。</p>
<p>普通の人間は、何も無い。普通、基礎を経験と理解で築くのが分かる。</p>
<p>それで理解出来るし、出来るようになる。</p>
<p>基礎を築いて、認識で考え、知り尽くせば分かる。</p>
<p>心が治った。認識も治った。もう、死んだ。</p>
<p>文章を書いて、「辛い」を作るのが、一番辛かった。</p>
<p>怖いだけは、不思議と、楽だ。</p>
