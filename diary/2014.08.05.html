</div><h1>＝2014-08-05＝</h1>

<p>世界の変化を全部書いていた。</p>
<p>発展か、停滞だ。</p>
<p>対立か、平和だ。</p>
<p>従属か、反抗だ。</p>
<p>集合か、拡散だ。</p>
<p>そして、環境を全部書いていた。</p>
<p>創造性か、協力か、争いか、優しさか、厳しさだ。</p>
<p>それで可能性を考えていた。</p>
<p>人間を作っていた。ユートピアか、平等か、平和か、自由か、勝利か、発展だ。</p>
<p>世界は僕が治すのではなく、自分で勝手に治るべきだ。</p>
<p>本当の価値とは、理想と未来を信じることだ。</p>
<p>抑圧から自由になれ。</p>
<p>反抗した方が良い。何にでも反抗する人間が多い。</p>
<p>最近、全部に従う人間になった。今の方が悪い。</p>
