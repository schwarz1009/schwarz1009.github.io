<h1>2026-03-15</h1>
<h2>僕はまだ書き続ける</h2>
<p>残念ながら、僕はまだ、文章を書き続ける。</p>
<p>僕にとって文章の執筆とは「頑張る力」であり、「生きる意志」である。</p>
<p>すなわち、僕が文章を書くのをやめると、僕の人生が終わりになってしまう。「生きる意志」がなくなり、「やる気」が失われてしまう。</p>
<p>だから、僕が生き続けるためには、この文章を書き続けなければならないのである。</p>
