<h1>2025-07-20</h1>
<h2>神を信じるしかない</h2>
<p>いろいろと言ったが、まだこの世界と僕とのお別れは訪れない。</p>
<p>お別れなんか、永遠に訪れなくていい。</p>
<p>ここから先は、神を信じるしかない。神は、「まともな人間になればいいことがある」と言う。だから、狂った人間でなく、まともな人間になろうとすればいいことがある。</p>
<p>そろそろ、大学の勉強は終わりだ。そもそも、勉強すれば分かるとは誰も保証していない。勉強すれば分かると思うのは思い込みにすぎない。だから、これ以上の勉強には何もない。</p>
