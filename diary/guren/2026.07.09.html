<h1>2026-07-09</h1>
<h2>もう僕は世界を殺さない</h2>
<p>そして、もう僕はこの世界を殺さない。</p>
<p>世界を殺しても、その後に自分も一緒に死ぬだけで、まったく意味がない、ということが分かった。</p>
<p>そうではなく、世界全員が治らない病気を治して、永遠に生きられるようにしたほうがいい。</p>
<p>だから、僕はこの世界を滅ぼすことをやめる。これ以上は、みんなが全員、永遠の命を得られるようにする。</p>
