<h1>2026-03-10</h1>
<h2>イスラエルが嫌いだ</h2>
<p>今まで、イスラエルの主張に譲歩する形で、パレスチナ地域の世界平和を求めてきた僕としては、方針の大転換となるのだが、僕はイスラエルという国が嫌いだ。</p>
<p>このイスラエルという国は、何から何まで腐っていて、好きになることができない。</p>
<p>僕は今回の戦争ではイランを支持する。イランに勝ってもらって、イスラエルをこの地球上から根滅することでしか、真に世界を平和にすることはできない。</p>
<p>残念だが、親イスラエルだった僕はもういない。僕は反イスラエルのイラン・イスラム主義者になる。</p>
