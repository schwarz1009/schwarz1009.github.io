<h2>一瞬だけ精神を使うのをやめる</h2>
<p>精神を治すために有効なのは、「一瞬だけ精神を使うのをやめる」という方法です。</p>
<p>すなわち、今精神を使っているのを、一瞬だけ一時的にやめ、その後に再び精神を使います。</p>
<p>それだけで、異常な使いすぎの精神は、すぐに治ります。</p>
