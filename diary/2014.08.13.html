</div><h1>＝2014-08-13＝</h1>

<p>新しい発想をしたかった。国を作った。</p>
<p>最低限、パンとアパートを与える。欲しい者にはコンピュータと音楽アルバムを与える。</p>
<p>ソニーとイオンに会社を統一する。</p>
<p>ノルマは、農業と工業が五十万円、重工業が六十万円にする。</p>
<p>王の上にキリスト教の神を置く。</p>
<p>公用語は、英語と日本語にする。</p>
<p>あとは、発想していた。</p>
<p>プレステとカードゲームを統合する。</p>
<p>ケータイの開発をオープンソースにする。</p>
<p>あとは、金にして、法律を皆で決める。</p>
<p>委員会を沢山作って、国会には委員会の代表を置く。</p>
