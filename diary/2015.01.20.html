</div><h1>＝2015-01-20＝</h1>

<p>都市や町、場所や土地などの、文化的なことを書いていた。</p>
<p>人間の構造や関係を全部書いていた。</p>
<p>ものには、場所、意味、実体、名前、成立手段と方法がある。</p>
<p>数学やLinuxのように、相対的な法則や対応関係を書いていた。</p>
<p>それぞれの場合に応じて、それぞれの法則がある。</p>
<p>それぞれの個体に応じて、それぞれの特性がある。</p>
<p>それぞれの方法に応じて、それぞれの結果がある。</p>
<p>それぞれの本質に応じて、それぞれの全体がある。</p>
<p>そのように、相対的に考えていた。</p>
