<h2>神 18:04</h2>
<p>いつもの神が賢いから、いつもの神になる。</p>
<p>神は、世界を解放したい僕を、支配する。</p>
<p>神は、世界の全ての国を教える。</p>
<p>神は、色んなものに替わって、話をする。</p>
<p>神は、宣言によって、僕の過去を全て成り立たせる。</p>
<p>僕は、自分を2つに分ける。フランス人と、ドイツ人だ。</p>
<p>あとは、科学を作り、自己を治していた。</p>
<p>歩き回る自分が怖かった。</p>
<p>何も分かっていない。一つとして、何も分からなくなった。</p>
<p>辛かった。</p>
