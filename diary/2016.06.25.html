</div><h1>＝2016-06-25＝</h1>
<p>怖いのは、悪いからだ。自分が悪いから、怖いだけだ。</p>
<p>怖いものは、嫌いになった方が良い。</p>
<p>そして、自分が今何をしているのか、もう一度綺麗な目線で考えた方が良い。</p>
<p>テレビを見るのが怖いのは、テレビが悪いからだ。</p>
<p>理由なんかつけなくて良い。自分で色々と理由をつけるから、分からなくなる。</p>
<p>ホームページの方に、日記のログを公開している。</p>
