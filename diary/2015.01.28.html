</div><h1>＝2015-01-28＝</h1>

<p>デリダのように、人間や科学の構造を作り直して分かっていた。</p>
<p>最初に言う言葉を考えれば良い。</p>
<p>自己認識、他者認識、環境への適応、社会と場の変化から分かっていた。</p>
<p>他人から見た自分も、自分である。それを考えなければ、分からない。</p>
<p>ソクラテスは、汝己を知れと言った。そのようにすれば分かる。</p>
<p>とにかく、環境への適応で分かっていた。</p>
