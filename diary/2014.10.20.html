</div><h1>＝2014-10-20＝</h1>

<p>ガラスのコップは、ガラスとコップという２つの概念から出来ている。</p>
<p>認識は、概念だ。</p>
<p>それで、どうすれば出来るかを考えると、Linuxやコンピュータが出来る。</p>
<p>生命は、水で出来ている。</p>
<p>色んなところに理想は存在する。</p>
<p>人間には、高度な理性がある。</p>
<p>神は、あなたが何々だと言う。</p>
<p>名前をつけるのが間違っている。すぐに次をするのが辛い。つらくて、すぐに消える。</p>
<p>推論と判断と神を消すと治る。</p>
<p>話を止めて、ゼロに戻れば治る。それが日本人だ。</p>
