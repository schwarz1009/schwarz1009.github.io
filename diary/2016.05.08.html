</div><h1>＝2016-05-08＝</h1>
<p>農園と図書館に行って、本を借りてきた。分かった内容は小説に書く。</p>
<p>本は、小説を書くための、写真や冒険や武道の本を借りた。</p>
<p>全ては、経験によって変わる。そういうことが分かる人間が多かった。</p>
<p>あとは、仕組みみたいなものを作っていた。いつも、仕組みを作っていた。</p>
<p>あとは、最初から分かっているのが悪い。</p>
<p>宇宙を創造したのが悪い。おかしく宇宙で分かるようになった。</p>
<p>動けば良い。動きたいのが治る。</p>
<p>意識や可能性で全部分かっていた。</p>
<p>速めるのが悪い。</p>
<p>正しいことを最初からするのが悪い。</p>
<p>宇宙人が自分をする。同じ体験をしたかった。</p>
