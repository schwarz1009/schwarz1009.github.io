</div><h1>＝2016-06-26＝</h1>
<p>真実をありのままに伝えなさい。皆、過ちを許してくれる。</p>
<p>世界には、色んなものがある。自分は、そこが分かっていない。</p>
<p>普通、他の人間や自然環境が多い。何故か、そういうことを思わないのがおかしい。</p>
<p>それから、普通、認知的なことを考える。心が何かを思わないのがおかしい。</p>
