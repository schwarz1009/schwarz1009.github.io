</div><h1>＝2014-07-26＝</h1>

<p>人間の望み、願い、欲、解決、理由、理想などを分かっていた。</p>
<p>全ての攻撃は、助けを求める叫び声だ。</p>
<p>欲は無い方が良い。あまりないが、世界を自分のものにしたいのや、自分の賢さや強さを誇示したいのや、馬鹿なことをまだやっているのが悪い。</p>
<p>キリスト教や仏教、人倫の世界が分かる。</p>
<p>仮象の世界を見抜け。</p>
