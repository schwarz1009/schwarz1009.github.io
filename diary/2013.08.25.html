<h2>社会主義</h2>
<p>昔は、自由なままで、社会主義を実現したかったことがありました。</p>
<p>実現性と平等な自由、リベラルで社会福祉や分配の平等を考えていました。</p>
<p>そのまま、支配と独立、共同体と評議会のままで、右翼も考えていました。</p>
<p>自由とは、何だったのか。</p>
<p>ただ、労働と分配の、自由で平等な、国家モデルだったのです。</p>
