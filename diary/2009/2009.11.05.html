</div><h1>＝2009-11-05＝</h1>
<p>結構、皆、好きな事をしたりした方が良いと思う。でも、好きな事と言われてもあまり思いつかない。</p>
<p>最初は、なんでもかんでも色々やった方が良いと思う。</p>
<p>失敗すると思うけど、出来るようになると楽しい。</p>
<p>あとは、継続するとつまらなくても結構やってるうちに好きになって、やるのが面白くなる。</p>
<p>ゲームなんかしてもつまらない。カードは考えるだけまだマシだ。</p>
<p>不思議と僕はピアノが面白いけど、習わないと出来ないし、最初は苦しい。</p>
